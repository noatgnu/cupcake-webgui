name: Test Ansible Playbook

on:
  push:
    branches: [main, master]
    paths:
      - 'provision/ansible/**'
      - '.github/workflows/test-ansible.yml'
  pull_request:
    paths:
      - 'provision/ansible/**'
      - '.github/workflows/test-ansible.yml'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install lint tools
        run: pip install ansible ansible-lint yamllint

      - name: Check YAML syntax
        working-directory: provision/ansible
        run: yamllint -d relaxed site.yml molecule/ templates/ group_vars/

      - name: Lint playbook
        working-directory: provision/ansible
        run: ansible-lint site.yml

  deploy-ubuntu:
    name: Deploy (Ubuntu 24.04)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ansible
        run: pip install ansible

      - name: Create placeholder frontends
        run: |
          sudo mkdir -p /opt/cupcake/webgui /opt/cupcake/vanilla
          echo '<html><head><title>Cupcake</title></head><body>test</body></html>' \
            | sudo tee /opt/cupcake/webgui/index.html
          echo '<html><head><title>Cupcake Vanilla</title></head><body>test</body></html>' \
            | sudo tee /opt/cupcake/vanilla/index.html

      - name: Run playbook against localhost
        working-directory: provision/ansible
        run: |
          ansible-playbook -i 'localhost,' -c local site.yml \
            -e install_whisper=false \
            -e python_version=3.12 \
            -e pg_version=16 \
            --become

      - name: Wait for backend to start
        run: |
          for i in $(seq 1 24); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/api/v1/ 2>/dev/null) || true
            if echo "$code" | grep -qE "^[234]"; then
              echo "Backend ready after $((i * 5))s"
              break
            fi
            [ "$i" -eq 24 ] && echo "Backend did not respond in 2min" && exit 1
            sleep 5
          done

      - name: Verify services
        run: |
          systemctl is-active postgresql   || (systemctl status postgresql;   exit 1)
          systemctl is-active redis-server || (systemctl status redis-server; exit 1)
          systemctl is-active nginx        || (systemctl status nginx;        exit 1)
          systemctl is-active cupcake-backend   || (systemctl status cupcake-backend;   exit 1)
          systemctl is-active cupcake-rqworker  || (systemctl status cupcake-rqworker;  exit 1)

      - name: Verify HTTP endpoints
        run: |
          curl -sf http://localhost/           -o /dev/null && echo "vanilla OK"
          curl -sf http://localhost:8080/      -o /dev/null && echo "cupcake OK"
          curl -sf http://127.0.0.1:8000/api/v1/ -o /dev/null && echo "API OK"

      - name: Verify database
        run: |
          su - postgres -c "psql -tAc \"SELECT 1 FROM pg_database WHERE datname='cupcake_vanilla_db'\"" \
            | grep -q 1 && echo "DB OK"

      - name: Check logs on failure
        if: failure()
        run: |
          journalctl -u cupcake-backend --no-pager -n 50 || true
          journalctl -u nginx --no-pager -n 20 || true
          journalctl -u postgresql --no-pager -n 20 || true

  molecule-ubuntu:
    name: Molecule (Ubuntu 24.04)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Molecule
        run: pip install ansible molecule molecule-docker docker

      - name: Run Molecule test
        working-directory: provision/ansible
        run: molecule test -s default

  molecule-debian:
    name: Molecule (Debian bookworm)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Molecule
        run: pip install ansible molecule molecule-docker docker

      - name: Run Molecule test
        working-directory: provision/ansible
        run: molecule test -s debian
