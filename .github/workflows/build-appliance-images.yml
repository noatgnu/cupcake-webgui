name: Build Appliance Images

on:
  workflow_dispatch:
    inputs:
      image_type:
        description: 'Image type'
        type: choice
        default: 'both'
        options: [vm, rpi, both]
      backend_ref:
        description: 'Backend branch/tag (cupcake_vanilla)'
        type: string
        default: 'master'
      webgui_ref:
        description: 'WebGUI branch/tag (cupcake-webgui)'
        type: string
        default: 'master'
      vanilla_ng_ref:
        description: 'Vanilla NG branch/tag (cupcake-vanilla-ng)'
        type: string
        default: 'master'

jobs:
  build-frontend:
    name: Pre-build Frontends
    if: inputs.image_type != 'vm'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build cupcake-webgui
        env:
          WEBGUI_REF: ${{ inputs.webgui_ref || 'master' }}
        run: |
          git clone --depth 1 --branch "$WEBGUI_REF" https://github.com/noatgnu/cupcake-webgui.git /tmp/webgui
          cd /tmp/webgui
          npm ci
          npx ng build --configuration=production --base-href /
          mkdir -p "$GITHUB_WORKSPACE/frontend/webgui"
          cp -r dist/cupcake/browser/* "$GITHUB_WORKSPACE/frontend/webgui/"

      - name: Build cupcake-vanilla-ng
        env:
          VANILLA_NG_REF: ${{ inputs.vanilla_ng_ref || 'master' }}
        run: |
          git clone --depth 1 --branch "$VANILLA_NG_REF" https://github.com/noatgnu/cupcake-vanilla-ng.git /tmp/vanilla-ng
          cd /tmp/vanilla-ng
          npm ci
          npx ng build @noatgnu/cupcake-core
          npx ng build @noatgnu/cupcake-vanilla
          npx ng build @noatgnu/cupcake-macaron
          npx ng build @noatgnu/cupcake-mint-chocolate
          npx ng build @noatgnu/cupcake-red-velvet
          npx ng build @noatgnu/cupcake-salted-caramel
          npx ng build --configuration=production --base-href /
          mkdir -p "$GITHUB_WORKSPACE/frontend/vanilla"
          cp -r dist/cupcake-vanilla-ng/browser/* "$GITHUB_WORKSPACE/frontend/vanilla/"

      - name: Upload webgui
        uses: actions/upload-artifact@v4
        with:
          name: cupcake-webgui-frontend
          path: frontend/webgui/
          retention-days: 1

      - name: Upload vanilla-ng
        uses: actions/upload-artifact@v4
        with:
          name: cupcake-vanilla-ng-frontend
          path: frontend/vanilla/
          retention-days: 1

  build-vm:
    name: VM Image (amd64)
    if: inputs.image_type != 'rpi'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils cloud-image-utils genisoimage wget openssh-client

      - name: Fix /dev/kvm permissions
        run: sudo chmod 666 /dev/kvm 2>/dev/null || true

      - name: Generate SSH key
        run: |
          ssh-keygen -t ed25519 -f cupckey -N '' -q
          echo "SSH_PUBKEY=$(cat cupckey.pub)" >> $GITHUB_ENV

      - name: Download Ubuntu cloud image
        run: |
          wget -q --show-progress "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img" -O vm-disk.qcow2
          qemu-img resize vm-disk.qcow2 8G

      - name: Create cloud-init seed
        run: |
          cat > ci-user-data << EOF
          #cloud-config
          users:
            - name: cupcake
              sudo: ALL=(ALL) NOPASSWD:ALL
              shell: /bin/bash
              lock_passwd: false
              ssh_authorized_keys:
                - $SSH_PUBKEY
          EOF
          sed -i 's/^          //' ci-user-data
          cloud-localds seed.iso ci-user-data provision/http/meta-data

      - name: Boot VM and wait for SSH
        timeout-minutes: 10
        run: |
          qemu-system-x86_64 \
            -m 4096 -smp 2 \
            -drive file=vm-disk.qcow2,format=qcow2,if=virtio \
            -drive file=seed.iso,format=raw,if=virtio \
            -netdev user,id=net0,hostfwd=tcp::2222-:22 \
            -device virtio-net-pci,netdev=net0 \
            -machine type=pc,accel=kvm -cpu host \
            -display none -serial file:serial.log &
          QEMU_PID=$!
          echo "QEMU_PID=$QEMU_PID" >> $GITHUB_ENV

          for i in $(seq 1 60); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=3 -i cupckey -p 2222 cupcake@localhost 'echo OK' 2>/dev/null; then
              echo "SSH ready (${i}x5s)"
              exit 0
            fi
            sleep 5
          done
          echo "=== SSH never came up. Serial console output: ==="
          cat serial.log 2>/dev/null | tail -50
          kill $QEMU_PID 2>/dev/null || true
          exit 1

      - name: Provision base
        timeout-minutes: 20
        run: |
          BACKEND_REF="${{ inputs.backend_ref || 'master' }}"
          for s in 01-base 02-postgresql 03-redis 04-backend; do
            scp -o StrictHostKeyChecking=no -i cupckey -P 2222 provision/scripts/${s}.sh cupcake@localhost:/tmp/
            ssh -o StrictHostKeyChecking=no -i cupckey -p 2222 cupcake@localhost \
              "chmod +x /tmp/${s}.sh && sudo env BACKEND_REF='${BACKEND_REF}' /tmp/${s}.sh"
          done

      - name: Provision frontend
        timeout-minutes: 60
        run: |
          WEBGUI_REF="${{ inputs.webgui_ref || 'master' }}"
          VANILLA_NG_REF="${{ inputs.vanilla_ng_ref || 'master' }}"
          scp -o StrictHostKeyChecking=no -i cupckey -P 2222 provision/scripts/05-frontend.sh cupcake@localhost:/tmp/
          ssh -o StrictHostKeyChecking=no -i cupckey -p 2222 cupcake@localhost \
            "chmod +x /tmp/05-frontend.sh && sudo env WEBGUI_REF='${WEBGUI_REF}' VANILLA_NG_REF='${VANILLA_NG_REF}' /tmp/05-frontend.sh"

      - name: Provision nginx and finalize
        timeout-minutes: 10
        run: |
          for s in 06-nginx 07-mdns 08-cleanup; do
            scp -o StrictHostKeyChecking=no -i cupckey -P 2222 provision/scripts/${s}.sh cupcake@localhost:/tmp/
            ssh -o StrictHostKeyChecking=no -i cupckey -p 2222 cupcake@localhost \
              "chmod +x /tmp/${s}.sh && sudo env /tmp/${s}.sh"
          done

      - name: Shutdown VM
        run: |
          ssh -o StrictHostKeyChecking=no -i cupckey -p 2222 cupcake@localhost 'sudo shutdown -P now' 2>/dev/null || true
          for i in $(seq 1 60); do
            if ! kill -0 $QEMU_PID 2>/dev/null; then
              echo "QEMU exited after ${i}x3s"
              break
            fi
            sleep 3
          done
          kill $QEMU_PID 2>/dev/null || true
          sleep 2

      - name: Compact and compress
        run: |
          qemu-img convert -O qcow2 -c vm-disk.qcow2 cupcake-vm-amd64.qcow2
          xz -3 cupcake-vm-amd64.qcow2
          ls -lh cupcake-vm-amd64.qcow2.xz

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: cupcake-vm-amd64
          path: cupcake-vm-amd64.qcow2.xz
          retention-days: 7

  build-rpi:
    name: RPi Image
    if: inputs.image_type != 'vm'
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download webgui frontend
        uses: actions/download-artifact@v4
        with:
          name: cupcake-webgui-frontend
          path: frontend/webgui

      - name: Download vanilla-ng frontend
        uses: actions/download-artifact@v4
        with:
          name: cupcake-vanilla-ng-frontend
          path: frontend/vanilla

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL /usr/local/lib/python*
          sudo apt-get clean
          df -h

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            coreutils quilt debootstrap zerofree zip dosfstools \
            libarchive-tools rsync xz-utils file git curl bc gpg pigz \
            qemu-user-static binfmt-support arch-test debian-archive-keyring \
            cmake gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Enable ARM64 emulation
        run: |
          sudo modprobe binfmt_misc
          sudo update-binfmts --enable qemu-aarch64 || true
          /usr/bin/qemu-aarch64-static --version

      - name: Clone pi-gen
        run: git clone --depth 1 --branch arm64 https://github.com/RPi-Distro/pi-gen.git

      - name: Patch pi-gen for qemu-user-static compatibility
        run: |
          sed -i 's/qemu-arm:qemu-user-binfmt/qemu-arm-static:qemu-user-static/' pi-gen/depends
          sudo ln -sf /usr/bin/qemu-arm-static /usr/local/bin/qemu-arm

          cat >> pi-gen/stage0/prerun.sh << 'SCRIPT'
          mkdir -p "${ROOTFS_DIR}/usr/share/keyrings"
          cp /usr/share/keyrings/debian-archive-keyring.gpg \
            "${ROOTFS_DIR}/usr/share/keyrings/debian-archive-keyring.pgp"
          SCRIPT

      - name: Create cupcake stage
        run: |
          mkdir -p pi-gen/stage2a/00-install-cupcake

          cat > pi-gen/stage2a/prerun.sh << 'EOF'
          #!/bin/bash -e
          if [ ! -d "${ROOTFS_DIR}" ]; then
            copy_previous
          fi
          EOF

          cat > pi-gen/stage2a/00-install-cupcake/00-run.sh << 'EOF'
          #!/bin/bash -e
          mkdir -p "${ROOTFS_DIR}/opt/cupcake/webgui"
          mkdir -p "${ROOTFS_DIR}/opt/cupcake/vanilla"
          cp -rT "${GITHUB_WORKSPACE}/frontend/webgui" "${ROOTFS_DIR}/opt/cupcake/webgui"
          cp -rT "${GITHUB_WORKSPACE}/frontend/vanilla" "${ROOTFS_DIR}/opt/cupcake/vanilla"

          git clone --depth 1 https://github.com/ggerganov/whisper.cpp.git /tmp/whisper-build
          cd /tmp/whisper-build
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DGGML_NATIVE=OFF \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++
          cmake --build build --config Release -j"$(nproc)"
          mkdir -p "${ROOTFS_DIR}/opt/cupcake/whisper.cpp/build/bin"
          mkdir -p "${ROOTFS_DIR}/opt/cupcake/whisper.cpp/models"
          cp build/bin/whisper-cli "${ROOTFS_DIR}/opt/cupcake/whisper.cpp/build/bin/"
          cd /tmp/whisper-build/models
          bash download-ggml-model.sh base
          cp ggml-base.bin "${ROOTFS_DIR}/opt/cupcake/whisper.cpp/models/"
          EOF

          cat > pi-gen/stage2a/00-install-cupcake/01-run-chroot.sh << 'EOF'
          #!/bin/bash -e

          echo "=== CUPCAKE: installing packages ==="
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y curl gpg
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | gpg --dearmor -o /usr/share/keyrings/postgresql-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql-keyring.gpg] https://apt.postgresql.org/pub/repos/apt trixie-pgdg main" > /etc/apt/sources.list.d/pgdg.list
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            postgresql-16 postgresql-client-16 redis-server nginx \
            python3 python3-venv python3-dev libpq-dev \
            avahi-daemon avahi-utils git ffmpeg

          systemctl --root=/ enable postgresql redis-server nginx avahi-daemon

          echo "=== CUPCAKE: creating user ==="
          useradd -m -s /bin/bash cupcake || true
          echo 'cupcake:cupcake' | chpasswd

          mkdir -p /opt/cupcake/{backend,static,media,backups,venv}
          mkdir -p /var/log/cupcake
          chown -R cupcake:cupcake /opt/cupcake /var/log/cupcake

          echo "=== CUPCAKE: setting up PostgreSQL ==="
          service postgresql start || \
            pg_ctlcluster "$(pg_lsclusters -h | head -1 | awk '{print $1, $2}')" start
          su - postgres -c "psql -c \"CREATE USER cupcake_vanilla WITH PASSWORD 'cupcake_vanilla_pass';\"" || true
          su - postgres -c "psql -c \"CREATE DATABASE cupcake_vanilla_db OWNER cupcake_vanilla;\"" || true
          su - postgres -c "psql -c \"ALTER USER cupcake_vanilla CREATEDB;\"" || true
          PG_HBA=$(su - postgres -c "psql -t -c 'SHOW hba_file;'" | tr -d ' ')
          sed -i 's/local[[:space:]]\+all[[:space:]]\+all[[:space:]]\+peer/local   all             all                                     md5/' "$PG_HBA"
          sed -i 's/host[[:space:]]\+all[[:space:]]\+all[[:space:]]\+127\.0\.0\.1\/32[[:space:]]\+scram-sha-256/host    all             all             127.0.0.1\/32            md5/' "$PG_HBA"
          service postgresql restart || \
            pg_ctlcluster "$(pg_lsclusters -h | head -1 | awk '{print $1, $2}')" restart

          echo "=== CUPCAKE: Python venv ==="
          python3 -m venv /opt/cupcake/venv
          /opt/cupcake/venv/bin/pip install --upgrade pip

          echo "=== CUPCAKE: cloning backend ==="
          git clone --depth 1 https://github.com/noatgnu/cupcake_vanilla.git /opt/cupcake/backend || true
          /opt/cupcake/venv/bin/pip install -r /opt/cupcake/backend/requirements.txt
          /opt/cupcake/venv/bin/pip install gunicorn "uvicorn[standard]" psycopg2-binary

          cat > /opt/cupcake/.env << 'DOTENV'
          POSTGRES_DB=cupcake_vanilla_db
          POSTGRES_USER=cupcake_vanilla
          POSTGRES_PASSWORD=cupcake_vanilla_pass
          POSTGRES_HOST=localhost
          POSTGRES_PORT=5432
          REDIS_HOST=127.0.0.1
          REDIS_PORT=6379
          DJANGO_SETTINGS_MODULE=cupcake_vanilla.settings
          SECRET_KEY=change-me-in-production
          DEBUG=False
          ENABLE_CUPCAKE_MACARON=True
          ENABLE_CUPCAKE_MINT_CHOCOLATE=True
          ENABLE_CUPCAKE_SALTED_CARAMEL=True
          ENABLE_CUPCAKE_RED_VELVET=True
          ALLOWED_HOSTS=cupcake.local,vanilla.local,cupcake,vanilla,localhost,127.0.0.1
          CORS_ALLOWED_ORIGINS=http://cupcake.local,http://vanilla.local,http://localhost
          STATIC_ROOT=/opt/cupcake/static
          MEDIA_ROOT=/opt/cupcake/media
          WHISPERCPP_PATH=/opt/cupcake/whisper.cpp/build/bin/whisper-cli
          WHISPERCPP_DEFAULT_MODEL=/opt/cupcake/whisper.cpp/models/ggml-base.bin
          WHISPERCPP_THREAD_COUNT=4
          DOTENV

          cd /opt/cupcake/backend
          set -a
          source /opt/cupcake/.env
          set +a
          /opt/cupcake/venv/bin/python manage.py migrate
          /opt/cupcake/venv/bin/python manage.py collectstatic --noinput

          echo "=== CUPCAKE: deploying nginx ==="
          cat > /etc/nginx/conf.d/cupcake-upstream.conf << NGXEOF
          upstream django_backend {
              server 127.0.0.1:8000;
          }
          NGXEOF

          cat > /etc/nginx/sites-available/cupcake.conf << NGXEOF
          server {
              listen 80;
              server_name cupcake.local cupcake;
              client_max_body_size 2G;
              root /opt/cupcake/webgui;
              index index.html;

              location / {
                  try_files \$uri \$uri/ /index.html;
              }

              location /api/ {
                  proxy_pass http://django_backend;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
                  proxy_read_timeout 300s;
              }

              location /admin/ {
                  proxy_pass http://django_backend;
                  proxy_set_header Host \$host;
              }

              location /ws/ {
                  proxy_pass http://django_backend;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade \$http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_set_header Host \$host;
                  proxy_read_timeout 86400s;
              }

              location /static/ {
                  alias /opt/cupcake/static/;
              }

              location /media/ {
                  alias /opt/cupcake/media/;
              }

              location /internal/media/ {
                  internal;
                  alias /opt/cupcake/media/;
              }
          }
          NGXEOF

          cat > /etc/nginx/sites-available/vanilla.conf << NGXEOF
          server {
              listen 80;
              server_name vanilla.local vanilla;
              client_max_body_size 2G;
              root /opt/cupcake/vanilla;
              index index.html;

              location / {
                  try_files \$uri \$uri/ /index.html;
              }

              location /api/ {
                  proxy_pass http://django_backend;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
                  proxy_read_timeout 300s;
              }

              location /admin/ {
                  proxy_pass http://django_backend;
                  proxy_set_header Host \$host;
              }

              location /ws/ {
                  proxy_pass http://django_backend;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade \$http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_set_header Host \$host;
                  proxy_read_timeout 86400s;
              }

              location /static/ {
                  alias /opt/cupcake/static/;
              }

              location /media/ {
                  alias /opt/cupcake/media/;
              }

              location /internal/media/ {
                  internal;
                  alias /opt/cupcake/media/;
              }
          }
          NGXEOF

          ln -sf /etc/nginx/sites-available/cupcake.conf /etc/nginx/sites-enabled/
          ln -sf /etc/nginx/sites-available/vanilla.conf /etc/nginx/sites-enabled/
          rm -f /etc/nginx/sites-enabled/default

          echo "=== CUPCAKE: deploying systemd ==="
          cat > /etc/systemd/system/cupcake-backend.service << 'UNITEOF'
          [Unit]
          Description=Cupcake Django Backend
          After=network.target postgresql.service redis-server.service
          Requires=postgresql.service redis-server.service

          [Service]
          Type=simple
          User=cupcake
          Group=cupcake
          WorkingDirectory=/opt/cupcake/backend
          EnvironmentFile=/opt/cupcake/.env
          ExecStart=/opt/cupcake/venv/bin/gunicorn cupcake_vanilla.asgi:application \
              --bind 127.0.0.1:8000 --workers 4 --timeout 300 \
              -k uvicorn.workers.UvicornWorker --log-level info
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          UNITEOF

          systemctl --root=/ enable cupcake-backend.service

          cat > /etc/systemd/system/cupcake-rqworker.service << 'UNITEOF'
          [Unit]
          Description=Cupcake RQ Worker (default high low)
          After=cupcake-backend.service
          Requires=cupcake-backend.service

          [Service]
          Type=simple
          User=cupcake
          Group=cupcake
          WorkingDirectory=/opt/cupcake/backend
          EnvironmentFile=/opt/cupcake/.env
          ExecStartPre=/opt/cupcake/venv/bin/python manage.py cleanup_dead_workers
          ExecStart=/opt/cupcake/venv/bin/python manage.py rqworker default high low
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          UNITEOF

          systemctl --root=/ enable cupcake-rqworker.service

          cat > /etc/systemd/system/cupcake-transcribe-worker.service << 'UNITEOF'
          [Unit]
          Description=Cupcake Transcribe Worker
          After=cupcake-backend.service
          Requires=cupcake-backend.service

          [Service]
          Type=simple
          User=cupcake
          Group=cupcake
          WorkingDirectory=/opt/cupcake/backend
          EnvironmentFile=/opt/cupcake/.env
          ExecStartPre=/opt/cupcake/venv/bin/python manage.py cleanup_dead_workers
          ExecStart=/opt/cupcake/venv/bin/python manage.py rqworker transcribe
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          UNITEOF

          systemctl --root=/ enable cupcake-transcribe-worker.service

          chown -R cupcake:cupcake /opt/cupcake /var/log/cupcake

          echo "=== CUPCAKE: stopping services ==="
          service postgresql stop || \
            pg_ctlcluster "$(pg_lsclusters -h | head -1 | awk '{print $1, $2}')" stop || true

          echo "=== CUPCAKE: done ==="
          EOF

          echo "IMG_SUFFIX=-cupcake" > pi-gen/stage2a/EXPORT_IMAGE
          chmod +x pi-gen/stage2a/prerun.sh \
            pi-gen/stage2a/00-install-cupcake/00-run.sh \
            pi-gen/stage2a/00-install-cupcake/01-run-chroot.sh

          touch pi-gen/stage3/SKIP pi-gen/stage4/SKIP pi-gen/stage5/SKIP

          cat > pi-gen/config << 'CFGEOF'
          IMG_NAME=cupcake-pi
          RELEASE=trixie
          DEPLOY_COMPRESSION=xz
          COMPRESSION_LEVEL=9
          LOCALE_DEFAULT=en_US.UTF-8
          TARGET_HOSTNAME=cupcake-pi
          KEYBOARD_KEYMAP=gb
          KEYBOARD_LAYOUT="English (UK)"
          TIMEZONE_DEFAULT=UTC
          FIRST_USER_NAME=cupcake
          FIRST_USER_PASS=cupcake123
          ENABLE_SSH=1
          STAGE_LIST="stage0 stage1 stage2 stage2a"
          BOOTSTRAP_KEYRING=debian-archive-keyring
          CFGEOF

      - name: Build
        timeout-minutes: 240
        run: |
          cd pi-gen
          export DEBOOTSTRAP_QEMU_USER_STATIC=/usr/bin/qemu-aarch64-static
          sudo -E USE_DOCKER=0 ./build.sh

      - name: Create model-specific images
        run: |
          mkdir -p deploy
          cd pi-gen/deploy
          shopt -s nullglob
          for img in *.img.xz; do
            base=$(basename "$img" .img.xz)
            for model in pi3b pi4 pi5; do
              cp "$img" "../../deploy/${base}-${model}.img.xz"
            done
          done
          cd ../..
          echo "Built images:"
          ls -lh deploy/ || echo "No images found"

      - name: Upload Pi 3B
        uses: actions/upload-artifact@v4
        with:
          name: cupcake-pi3b-arm64
          path: deploy/*pi3b*.img.xz
          retention-days: 30

      - name: Upload Pi 4
        uses: actions/upload-artifact@v4
        with:
          name: cupcake-pi4-arm64
          path: deploy/*pi4*.img.xz
          retention-days: 30

      - name: Upload Pi 5
        uses: actions/upload-artifact@v4
        with:
          name: cupcake-pi5-arm64
          path: deploy/*pi5*.img.xz
          retention-days: 30

  summary:
    name: Summary
    needs: [build-frontend, build-vm, build-rpi]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## Cupcake Appliance Images" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| VM (amd64) | ${{ needs.build-vm.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| RPi 3B | ${{ needs.build-rpi.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| RPi 4 | ${{ needs.build-rpi.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| RPi 5 | ${{ needs.build-rpi.result }} |" >> $GITHUB_STEP_SUMMARY
