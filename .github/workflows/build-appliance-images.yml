name: Build Appliance Images

on:
  workflow_dispatch:
    inputs:
      image_type:
        description: 'Image type'
        type: choice
        default: 'both'
        options: [vm, rpi, both]
      backend_ref:
        description: 'Backend branch/tag (cupcake_vanilla)'
        type: string
        default: 'master'
      webgui_ref:
        description: 'WebGUI branch/tag (cupcake-webgui)'
        type: string
        default: 'master'
      vanilla_ng_ref:
        description: 'Vanilla NG branch/tag (cupcake-vanilla-ng)'
        type: string
        default: 'master'

jobs:
  build-frontend:
    name: Pre-build Frontends
    if: inputs.image_type != 'vm'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build cupcake-webgui
        env:
          WEBGUI_REF: ${{ inputs.webgui_ref || 'master' }}
        run: |
          git clone --depth 1 --branch "$WEBGUI_REF" https://github.com/noatgnu/cupcake-webgui.git /tmp/webgui
          cd /tmp/webgui
          npm ci
          npx ng build --configuration=appliance --base-href /
          mkdir -p "$GITHUB_WORKSPACE/frontend/webgui"
          cp -r dist/cupcake/browser/* "$GITHUB_WORKSPACE/frontend/webgui/"

      - name: Build cupcake-vanilla-ng
        env:
          VANILLA_NG_REF: ${{ inputs.vanilla_ng_ref || 'master' }}
        run: |
          git clone --depth 1 --branch "$VANILLA_NG_REF" https://github.com/noatgnu/cupcake-vanilla-ng.git /tmp/vanilla-ng
          cd /tmp/vanilla-ng
          npm ci
          npx ng build @noatgnu/cupcake-core
          npx ng build @noatgnu/cupcake-vanilla
          npx ng build @noatgnu/cupcake-macaron
          npx ng build @noatgnu/cupcake-mint-chocolate
          npx ng build @noatgnu/cupcake-red-velvet
          npx ng build @noatgnu/cupcake-salted-caramel
          npx ng build --configuration=appliance --base-href /
          mkdir -p "$GITHUB_WORKSPACE/frontend/vanilla"
          cp -r dist/cupcake-vanilla-ng/browser/* "$GITHUB_WORKSPACE/frontend/vanilla/"

      - name: Upload webgui
        uses: actions/upload-artifact@v4
        with:
          name: cupcake-webgui-frontend
          path: frontend/webgui/
          retention-days: 1

      - name: Upload vanilla-ng
        uses: actions/upload-artifact@v4
        with:
          name: cupcake-vanilla-ng-frontend
          path: frontend/vanilla/
          retention-days: 1

  build-db:
    name: Build seeded database
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3 python3-venv python3-dev libpq-dev \
            postgresql postgresql-client redis-server
          sudo service redis-server start || true

      - name: Set up PostgreSQL
        run: |
          sudo service postgresql start
          sudo -u postgres psql -c "CREATE USER cupcake_vanilla WITH PASSWORD 'cupcake_vanilla_pass';"
          sudo -u postgres psql -c "CREATE DATABASE cupcake_vanilla_db OWNER cupcake_vanilla;"
          sudo -u postgres psql -c "ALTER USER cupcake_vanilla CREATEDB;"

      - name: Clone backend and install dependencies
        env:
          BACKEND_REF: ${{ inputs.backend_ref || 'master' }}
        run: |
          python3 -m venv /tmp/venv
          /tmp/venv/bin/pip install --upgrade pip --quiet
          git clone --depth 1 --branch "$BACKEND_REF" \
            https://github.com/noatgnu/cupcake_vanilla.git /tmp/backend
          /tmp/venv/bin/pip install -r /tmp/backend/requirements.txt --quiet

      - name: Migrate and create superuser
        env:
          POSTGRES_DB: cupcake_vanilla_db
          POSTGRES_USER: cupcake_vanilla
          POSTGRES_PASSWORD: cupcake_vanilla_pass
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: '5432'
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: '6379'
          DJANGO_SETTINGS_MODULE: cupcake_vanilla.settings
          SECRET_KEY: build-time-only-not-used-in-production
          DEBUG: 'False'
          ENABLE_CUPCAKE_MACARON: 'True'
          ENABLE_CUPCAKE_MINT_CHOCOLATE: 'True'
          ENABLE_CUPCAKE_SALTED_CARAMEL: 'True'
          ENABLE_CUPCAKE_RED_VELVET: 'True'
          ALLOWED_HOSTS: localhost
        run: |
          cd /tmp/backend
          /tmp/venv/bin/python manage.py migrate --noinput
          DJANGO_SUPERUSER_USERNAME=admin \
          DJANGO_SUPERUSER_EMAIL=admin@cupcake.local \
          DJANGO_SUPERUSER_PASSWORD=cupcake \
          /tmp/venv/bin/python manage.py createsuperuser --noinput

      - name: Load ontologies
        timeout-minutes: 240
        env:
          POSTGRES_DB: cupcake_vanilla_db
          POSTGRES_USER: cupcake_vanilla
          POSTGRES_PASSWORD: cupcake_vanilla_pass
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: '5432'
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: '6379'
          DJANGO_SETTINGS_MODULE: cupcake_vanilla.settings
          SECRET_KEY: build-time-only-not-used-in-production
          DEBUG: 'False'
          ENABLE_CUPCAKE_MACARON: 'True'
          ENABLE_CUPCAKE_MINT_CHOCOLATE: 'True'
          ENABLE_CUPCAKE_SALTED_CARAMEL: 'True'
          ENABLE_CUPCAKE_RED_VELVET: 'True'
          ALLOWED_HOSTS: localhost
        run: |
          cd /tmp/backend
          MANAGE="/tmp/venv/bin/python manage.py"
          $MANAGE load_species
          $MANAGE load_tissue
          $MANAGE load_human_disease
          $MANAGE load_subcellular_location
          $MANAGE load_ms_mod
          $MANAGE load_ms_term
          $MANAGE load_ontologies --ontology all --no-limit

      - name: Dump database
        run: |
          PGPASSWORD=cupcake_vanilla_pass pg_dump \
            -h 127.0.0.1 -U cupcake_vanilla \
            --format=plain \
            cupcake_vanilla_db \
            | gzip -6 > cupcake-seed.sql.gz
          echo "Seed dump size: $(du -sh cupcake-seed.sql.gz | cut -f1)"

      - name: Upload seed database
        uses: actions/upload-artifact@v4
        with:
          name: cupcake-seed-db
          path: cupcake-seed.sql.gz
          retention-days: 1

  build-vm:
    name: VM Image (amd64)
    if: inputs.image_type != 'rpi'
    needs: build-db
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils cloud-image-utils genisoimage wget openssh-client

      - name: Fix /dev/kvm permissions
        run: sudo chmod 666 /dev/kvm 2>/dev/null || true

      - name: Generate SSH key
        run: |
          ssh-keygen -t ed25519 -f cupckey -N '' -q
          echo "SSH_PUBKEY=$(cat cupckey.pub)" >> $GITHUB_ENV

      - name: Download Ubuntu cloud image
        run: |
          wget -q --show-progress "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img" -O vm-disk.qcow2
          qemu-img resize vm-disk.qcow2 20G

      - name: Create cloud-init seed
        run: |
          sed "s|SSH_PUBKEY_PLACEHOLDER|${SSH_PUBKEY}|" \
            "$GITHUB_WORKSPACE/provision/http/cloud-init-user-data.tmpl" > ci-user-data
          cloud-localds seed.iso ci-user-data provision/http/meta-data

      - name: Boot VM and wait for SSH
        timeout-minutes: 10
        run: |
          qemu-system-x86_64 \
            -m 4096 -smp 2 \
            -drive file=vm-disk.qcow2,format=qcow2,if=virtio \
            -drive file=seed.iso,format=raw,if=virtio \
            -netdev user,id=net0,hostfwd=tcp::2222-:22,hostfwd=tcp::8080-:80,hostfwd=tcp::8443-:443 \
            -device virtio-net-pci,netdev=net0 \
            -machine type=pc,accel=kvm -cpu host \
            -display none -serial file:serial.log &
          QEMU_PID=$!
          echo "QEMU_PID=$QEMU_PID" >> $GITHUB_ENV

          for i in $(seq 1 60); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=3 -i cupckey -p 2222 cupcake@localhost 'echo OK' 2>/dev/null; then
              echo "SSH ready (${i}x5s)"
              exit 0
            fi
            sleep 5
          done
          echo "=== SSH never came up. Serial console output: ==="
          cat serial.log 2>/dev/null | tail -50
          kill $QEMU_PID 2>/dev/null || true
          exit 1

      - name: Provision base
        timeout-minutes: 20
        run: |
          BACKEND_REF="${{ inputs.backend_ref || 'master' }}"
          for s in 01-base 02-postgresql 03-redis 04-backend 10-tailscale 11-cloudflared; do
            scp -o StrictHostKeyChecking=no -i cupckey -P 2222 provision/scripts/${s}.sh cupcake@localhost:/tmp/
            ssh -o StrictHostKeyChecking=no -i cupckey -p 2222 cupcake@localhost \
              "chmod +x /tmp/${s}.sh && sudo env BACKEND_REF='${BACKEND_REF}' /tmp/${s}.sh"
          done

      - name: Download seed database
        uses: actions/download-artifact@v4
        with:
          name: cupcake-seed-db

      - name: Restore seed database
        timeout-minutes: 30
        run: |
          scp -o StrictHostKeyChecking=no -i cupckey -P 2222 \
            cupcake-seed.sql.gz provision/scripts/restore-seed.sh cupcake@localhost:/tmp/
          ssh -o StrictHostKeyChecking=no -i cupckey -p 2222 cupcake@localhost \
            "chmod +x /tmp/restore-seed.sh && sudo /tmp/restore-seed.sh"

      - name: Provision frontend
        timeout-minutes: 60
        run: |
          WEBGUI_REF="${{ inputs.webgui_ref || 'master' }}"
          VANILLA_NG_REF="${{ inputs.vanilla_ng_ref || 'master' }}"
          scp -o StrictHostKeyChecking=no -i cupckey -P 2222 provision/scripts/05-frontend.sh cupcake@localhost:/tmp/
          ssh -o StrictHostKeyChecking=no -i cupckey -p 2222 cupcake@localhost \
            "chmod +x /tmp/05-frontend.sh && sudo env WEBGUI_REF='${WEBGUI_REF}' VANILLA_NG_REF='${VANILLA_NG_REF}' /tmp/05-frontend.sh"

      - name: Provision nginx
        timeout-minutes: 10
        run: |
          for s in 06-nginx 07-mdns; do
            scp -o StrictHostKeyChecking=no -i cupckey -P 2222 provision/scripts/${s}.sh cupcake@localhost:/tmp/
            ssh -o StrictHostKeyChecking=no -i cupckey -p 2222 cupcake@localhost \
              "chmod +x /tmp/${s}.sh && sudo env /tmp/${s}.sh"
          done

      - name: Install services
        timeout-minutes: 10
        run: |
          scp -o StrictHostKeyChecking=no -i cupckey -P 2222 \
            provision/scripts/08-cleanup.sh \
            provision/scripts/update.sh \
            provision/scripts/configure-tailscale.sh \
            provision/scripts/configure-cloudflared.sh \
            provision/scripts/configure-storage.sh \
            cupcake@localhost:/tmp/
          scp -o StrictHostKeyChecking=no -i cupckey -P 2222 -r \
            provision/config-examples \
            cupcake@localhost:/tmp/
          ssh -o StrictHostKeyChecking=no -i cupckey -p 2222 cupcake@localhost \
            "chmod +x /tmp/08-cleanup.sh && sudo env /tmp/08-cleanup.sh"

      - name: Start services for smoke test
        run: |
          ssh -o StrictHostKeyChecking=no -i cupckey -p 2222 cupcake@localhost \
            "sudo systemctl start postgresql redis-server nginx cupcake-backend"
          for i in $(seq 1 20); do
            code=$(ssh -o StrictHostKeyChecking=no -i cupckey -p 2222 cupcake@localhost \
              "curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8000/api/v1/" 2>/dev/null) || true
            if echo "$code" | grep -qE "^[234][0-9][0-9]$"; then
              echo "Backend ready after ${i}x3s"
              break
            fi
            sleep 3
          done
          ssh -o StrictHostKeyChecking=no -i cupckey -p 2222 cupcake@localhost \
            "sudo systemctl start cupcake-rqworker cupcake-transcribe-worker"

      - name: Smoke test
        timeout-minutes: 10
        run: |
          scp -o StrictHostKeyChecking=no -i cupckey -P 2222 \
            provision/scripts/09-smoke-test.sh cupcake@localhost:/tmp/
          ssh -o StrictHostKeyChecking=no -i cupckey -p 2222 cupcake@localhost \
            "chmod +x /tmp/09-smoke-test.sh && sudo /tmp/09-smoke-test.sh"

      - name: UI smoke test
        timeout-minutes: 15
        run: |
          echo "127.0.0.1 cupcake.local vanilla.local" | sudo tee -a /etc/hosts

          sudo apt-get install -y socat
          sudo socat TCP-LISTEN:443,fork,reuseaddr TCP:127.0.0.1:8443 &
          sudo socat TCP-LISTEN:80,fork,reuseaddr TCP:127.0.0.1:8080 &

          mkdir -p /tmp/ui-test && cd /tmp/ui-test
          npm init -y --quiet
          npm install --quiet playwright
          npx playwright install chromium --with-deps

          cp "$GITHUB_WORKSPACE/.github/scripts/ui-test.js" .
          node ui-test.js

      - name: Upload UI test screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-screenshots
          path: /tmp/ui-test/screenshot-*.png
          retention-days: 3

      - name: Remove CI SSH key
        run: |
          ssh -o StrictHostKeyChecking=no -i cupckey -p 2222 cupcake@localhost \
            "sudo rm -f /home/cupcake/.ssh/authorized_keys"

      - name: Shutdown VM
        run: |
          ssh -o StrictHostKeyChecking=no -i cupckey -p 2222 cupcake@localhost 'sudo shutdown -P now' 2>/dev/null || true
          for i in $(seq 1 60); do
            if ! kill -0 $QEMU_PID 2>/dev/null; then
              echo "QEMU exited after ${i}x3s"
              break
            fi
            sleep 3
          done
          kill $QEMU_PID 2>/dev/null || true
          sleep 2

      - name: Compact and compress
        run: |
          qemu-img convert -O qcow2 -c vm-disk.qcow2 cupcake-vm-amd64.qcow2
          xz -3 cupcake-vm-amd64.qcow2
          ls -lh cupcake-vm-amd64.qcow2.xz

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: cupcake-vm-amd64
          path: cupcake-vm-amd64.qcow2.xz
          retention-days: 7

  build-rpi:
    name: RPi Image
    if: inputs.image_type != 'vm'
    needs: [build-frontend, build-db]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download webgui frontend
        uses: actions/download-artifact@v4
        with:
          name: cupcake-webgui-frontend
          path: frontend/webgui

      - name: Download vanilla-ng frontend
        uses: actions/download-artifact@v4
        with:
          name: cupcake-vanilla-ng-frontend
          path: frontend/vanilla

      - name: Download seed database
        uses: actions/download-artifact@v4
        with:
          name: cupcake-seed-db

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL /usr/local/lib/python*
          sudo apt-get clean
          df -h

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            coreutils quilt debootstrap zerofree zip dosfstools \
            libarchive-tools rsync xz-utils file git curl bc gpg pigz \
            qemu-user-static binfmt-support arch-test debian-archive-keyring \
            cmake gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Enable ARM64 emulation
        run: |
          sudo modprobe binfmt_misc
          sudo update-binfmts --enable qemu-aarch64 || true
          /usr/bin/qemu-aarch64-static --version

      - name: Clone pi-gen
        run: git clone --depth 1 --branch arm64 https://github.com/RPi-Distro/pi-gen.git

      - name: Patch pi-gen for qemu-user-static compatibility
        run: |
          sed -i 's/qemu-arm:qemu-user-binfmt/qemu-arm-static:qemu-user-static/' pi-gen/depends
          sudo ln -sf /usr/bin/qemu-arm-static /usr/local/bin/qemu-arm

          cat >> pi-gen/stage0/prerun.sh << 'SCRIPT'
          mkdir -p "${ROOTFS_DIR}/usr/share/keyrings"
          cp /usr/share/keyrings/debian-archive-keyring.gpg \
            "${ROOTFS_DIR}/usr/share/keyrings/debian-archive-keyring.pgp"
          SCRIPT

      - name: Create cupcake stage
        run: |
          mkdir -p pi-gen/stage2a/00-install-cupcake

          cat > pi-gen/stage2a/prerun.sh << 'EOF'
          #!/bin/bash -e
          if [ ! -d "${ROOTFS_DIR}" ]; then
            copy_previous
          fi
          EOF

          cat > pi-gen/stage2a/00-install-cupcake/00-run.sh << 'EOF'
          #!/bin/bash -e
          mkdir -p "${ROOTFS_DIR}/opt/cupcake/webgui"
          mkdir -p "${ROOTFS_DIR}/opt/cupcake/vanilla"
          cp -rT "${GITHUB_WORKSPACE}/frontend/webgui" "${ROOTFS_DIR}/opt/cupcake/webgui"
          cp -rT "${GITHUB_WORKSPACE}/frontend/vanilla" "${ROOTFS_DIR}/opt/cupcake/vanilla"

          WEBGUI_COMMIT=$(git -C /tmp/webgui rev-parse --short HEAD 2>/dev/null || echo "unknown")
          VANILLA_NG_COMMIT=$(git -C /tmp/vanilla-ng rev-parse --short HEAD 2>/dev/null || echo "unknown")
          printf '%s\n' \
              "WEBGUI_COMMIT=${WEBGUI_COMMIT}" \
              "VANILLA_NG_COMMIT=${VANILLA_NG_COMMIT}" \
              > "${ROOTFS_DIR}/opt/cupcake/.frontend-versions"

          cp "${GITHUB_WORKSPACE}/provision/scripts/update.sh" "${ROOTFS_DIR}/opt/cupcake/update.sh"
          chmod +x "${ROOTFS_DIR}/opt/cupcake/update.sh"
          cp "${GITHUB_WORKSPACE}/provision/scripts/configure-tailscale.sh" "${ROOTFS_DIR}/opt/cupcake/configure-tailscale.sh"
          chmod +x "${ROOTFS_DIR}/opt/cupcake/configure-tailscale.sh"
          cp "${GITHUB_WORKSPACE}/provision/scripts/configure-cloudflared.sh" "${ROOTFS_DIR}/opt/cupcake/configure-cloudflared.sh"
          chmod +x "${ROOTFS_DIR}/opt/cupcake/configure-cloudflared.sh"
          cp "${GITHUB_WORKSPACE}/provision/scripts/configure-storage.sh" "${ROOTFS_DIR}/opt/cupcake/configure-storage.sh"
          chmod +x "${ROOTFS_DIR}/opt/cupcake/configure-storage.sh"

          mkdir -p "${ROOTFS_DIR}/opt/cupcake/examples"
          cp "${GITHUB_WORKSPACE}/provision/config-examples/"*.example "${ROOTFS_DIR}/opt/cupcake/examples/"
          chmod 644 "${ROOTFS_DIR}/opt/cupcake/examples/"*.example

          mkdir -p "${ROOTFS_DIR}/boot/firmware"
          cp "${GITHUB_WORKSPACE}/provision/config-examples/"*.example "${ROOTFS_DIR}/boot/firmware/"
          chmod 644 "${ROOTFS_DIR}/boot/firmware/"*.example

          git clone --depth 1 https://github.com/ggerganov/whisper.cpp.git /tmp/whisper-build
          cd /tmp/whisper-build
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DGGML_NATIVE=OFF \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++
          cmake --build build --config Release -j"$(nproc)"
          mkdir -p "${ROOTFS_DIR}/opt/cupcake/whisper.cpp/build/bin"
          mkdir -p "${ROOTFS_DIR}/opt/cupcake/whisper.cpp/models"
          cp build/bin/whisper-cli "${ROOTFS_DIR}/opt/cupcake/whisper.cpp/build/bin/"
          cd /tmp/whisper-build/models
          bash download-ggml-model.sh base
          cp ggml-base.bin "${ROOTFS_DIR}/opt/cupcake/whisper.cpp/models/"
          cp "${GITHUB_WORKSPACE}/cupcake-seed.sql.gz" "${ROOTFS_DIR}/tmp/"
          EOF

          cat > pi-gen/stage2a/00-install-cupcake/01-run-chroot.sh << 'EOF'
          #!/bin/bash -e

          echo "=== CUPCAKE: installing packages ==="
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y curl gpg
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | gpg --dearmor -o /usr/share/keyrings/postgresql-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql-keyring.gpg] https://apt.postgresql.org/pub/repos/apt trixie-pgdg main" > /etc/apt/sources.list.d/pgdg.list
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            postgresql-16 postgresql-client-16 redis-server nginx \
            python3 python3-venv python3-dev libpq-dev \
            avahi-daemon avahi-utils git ffmpeg jq \
            network-manager wireless-tools iw \
            nfs-common cifs-utils exfatprogs

          echo "=== CUPCAKE: installing Tailscale ==="
          curl -fsSL https://pkgs.tailscale.com/stable/debian/trixie.noarmor.gpg \
              -o /usr/share/keyrings/tailscale-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/debian trixie main" \
              > /etc/apt/sources.list.d/tailscale.list
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y tailscale

          echo "=== CUPCAKE: installing cloudflared ==="
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-arm64.deb \
              -o /tmp/cloudflared.deb
          dpkg -i /tmp/cloudflared.deb
          rm /tmp/cloudflared.deb

          systemctl --root=/ enable postgresql redis-server nginx avahi-daemon NetworkManager tailscaled

          echo "=== CUPCAKE: creating users ==="
          mkdir -p /opt/cupcake/{backend,static,media,backups,venv}
          mkdir -p /var/log/cupcake

          useradd -r -s /usr/sbin/nologin -M -d /opt/cupcake cupcake-svc || true
          usermod -aG www-data cupcake-svc

          useradd -m -s /bin/bash cupcake || true
          echo 'cupcake:cupcake' | chpasswd
          usermod -aG sudo cupcake
          usermod -aG cupcake-svc cupcake

          chown -R cupcake-svc:cupcake-svc /opt/cupcake /var/log/cupcake
          chmod 775 /var/log/cupcake

          echo "=== CUPCAKE: setting up PostgreSQL ==="
          service postgresql start || \
            pg_ctlcluster "$(pg_lsclusters -h | head -1 | awk '{print $1, $2}')" start
          su - postgres -c "psql -c \"CREATE USER cupcake_vanilla WITH PASSWORD 'cupcake_vanilla_pass';\"" || true
          su - postgres -c "psql -c \"CREATE DATABASE cupcake_vanilla_db OWNER cupcake_vanilla;\"" || true
          su - postgres -c "psql -c \"ALTER USER cupcake_vanilla CREATEDB;\"" || true
          PG_HBA=$(su - postgres -c "psql -t -c 'SHOW hba_file;'" | tr -d ' ')
          sed -i 's/local[[:space:]]\+all[[:space:]]\+all[[:space:]]\+peer/local   all             all                                     md5/' "$PG_HBA"
          sed -i 's/host[[:space:]]\+all[[:space:]]\+all[[:space:]]\+127\.0\.0\.1\/32[[:space:]]\+scram-sha-256/host    all             all             127.0.0.1\/32            md5/' "$PG_HBA"
          service postgresql restart || \
            pg_ctlcluster "$(pg_lsclusters -h | head -1 | awk '{print $1, $2}')" restart

          echo "=== CUPCAKE: Python venv ==="
          python3 -m venv /opt/cupcake/venv
          /opt/cupcake/venv/bin/pip install --upgrade pip

          echo "=== CUPCAKE: cloning backend ==="
          git clone --depth 1 https://github.com/noatgnu/cupcake_vanilla.git /opt/cupcake/backend || true
          /opt/cupcake/venv/bin/pip install -r /opt/cupcake/backend/requirements.txt
          /opt/cupcake/venv/bin/pip install gunicorn "uvicorn[standard]" psycopg2-binary

          cat > /opt/cupcake/.env << 'DOTENV'
          POSTGRES_DB=cupcake_vanilla_db
          POSTGRES_USER=cupcake_vanilla
          POSTGRES_PASSWORD=cupcake_vanilla_pass
          POSTGRES_HOST=localhost
          POSTGRES_PORT=5432
          REDIS_HOST=127.0.0.1
          REDIS_PORT=6379
          DJANGO_SETTINGS_MODULE=cupcake_vanilla.settings
          SECRET_KEY=CHANGE-ON-FIRST-BOOT
          DEBUG=False
          ENABLE_CUPCAKE_MACARON=True
          ENABLE_CUPCAKE_MINT_CHOCOLATE=True
          ENABLE_CUPCAKE_SALTED_CARAMEL=True
          ENABLE_CUPCAKE_RED_VELVET=True
          ALLOWED_HOSTS=*
          CORS_ALLOWED_ORIGINS=https://cupcake.local,https://vanilla.local,http://cupcake.local,http://vanilla.local,http://localhost
          WHISPERCPP_PATH=/opt/cupcake/whisper.cpp/build/bin/whisper-cli
          WHISPERCPP_DEFAULT_MODEL=/opt/cupcake/whisper.cpp/models/ggml-base.bin
          WHISPERCPP_THREAD_COUNT=4
          DOTENV

          cat > /opt/cupcake/first-boot.sh << 'FBEOF'
          #!/bin/bash
          set -e
          ENV_FILE=/opt/cupcake/.env

          if grep -q "^SECRET_KEY=CHANGE-ON-FIRST-BOOT" "$ENV_FILE"; then
              SECRET_KEY=$(tr -dc 'A-Za-z0-9-_+@%^=' < /dev/urandom | head -c 50)
              sed -i "s|^SECRET_KEY=CHANGE-ON-FIRST-BOOT|SECRET_KEY=${SECRET_KEY}|" "$ENV_FILE"
          fi

          WIFI_CONFIG=/boot/firmware/cupcake-wifi.txt
          if [ -f "$WIFI_CONFIG" ]; then
              SSID=$(grep "^SSID=" "$WIFI_CONFIG" | cut -d= -f2-)
              PASSWORD=$(grep "^PASSWORD=" "$WIFI_CONFIG" | cut -d= -f2-)
              COUNTRY=$(grep "^COUNTRY=" "$WIFI_CONFIG" | cut -d= -f2-)
              COUNTRY=${COUNTRY:-GB}

              if [ -n "$SSID" ] && [ -n "$PASSWORD" ]; then
                  printf 'REGDOMAIN=%s\n' "$COUNTRY" > /etc/default/crda
                  iw reg set "$COUNTRY" 2>/dev/null || true
                  nmcli connection add \
                      type wifi \
                      con-name "cupcake-wifi" \
                      ifname "*" \
                      ssid "$SSID" \
                      wifi-sec.key-mgmt wpa-psk \
                      wifi-sec.psk "$PASSWORD" \
                      connection.autoconnect yes \
                      ipv4.method auto \
                      ipv6.method auto
                  nmcli connection up "cupcake-wifi" 2>/dev/null || true
              fi
              rm -f "$WIFI_CONFIG"
          fi

          TAILSCALE_CONFIG=/boot/firmware/cupcake-tailscale.txt
          if [ -f "$TAILSCALE_CONFIG" ]; then
              AUTHKEY=$(grep "^AUTHKEY=" "$TAILSCALE_CONFIG" | cut -d= -f2-)
              if [ -n "$AUTHKEY" ]; then
                  tailscale up --authkey "$AUTHKEY" --ssh 2>/dev/null || true
              fi
              rm -f "$TAILSCALE_CONFIG"
          fi

          CLOUDFLARED_CONFIG=/boot/firmware/cupcake-cloudflared.txt
          if [ -f "$CLOUDFLARED_CONFIG" ]; then
              TOKEN=$(grep "^TUNNEL_TOKEN=" "$CLOUDFLARED_CONFIG" | cut -d= -f2-)
              if [ -n "$TOKEN" ]; then
                  cloudflared service install "$TOKEN" 2>/dev/null || true
                  systemctl enable --now cloudflared 2>/dev/null || true
              fi
              rm -f "$CLOUDFLARED_CONFIG"
          fi

          STORAGE_CONFIG=/boot/firmware/cupcake-storage.txt
          if [ -f "$STORAGE_CONFIG" ]; then
              TYPE=$(grep "^TYPE=" "$STORAGE_CONFIG" | cut -d= -f2-)
              case "$TYPE" in
                  usb)
                      LABEL=$(grep "^LABEL=" "$STORAGE_CONFIG" | cut -d= -f2-)
                      FSTYPE=$(grep "^FSTYPE=" "$STORAGE_CONFIG" | cut -d= -f2- || echo "auto")
                      /opt/cupcake/configure-storage.sh usb "$LABEL" "$FSTYPE" || true
                      ;;
                  nfs)
                      SERVER=$(grep "^NFS_SERVER=" "$STORAGE_CONFIG" | cut -d= -f2-)
                      SHARE=$(grep "^NFS_SHARE=" "$STORAGE_CONFIG" | cut -d= -f2-)
                      /opt/cupcake/configure-storage.sh nfs "$SERVER" "$SHARE" || true
                      ;;
                  smb)
                      SERVER=$(grep "^SMB_SERVER=" "$STORAGE_CONFIG" | cut -d= -f2-)
                      USERNAME=$(grep "^SMB_USERNAME=" "$STORAGE_CONFIG" | cut -d= -f2-)
                      PASSWORD=$(grep "^SMB_PASSWORD=" "$STORAGE_CONFIG" | cut -d= -f2-)
                      /opt/cupcake/configure-storage.sh smb "$SERVER" "$USERNAME" "$PASSWORD" || true
                      ;;
              esac
              rm -f "$STORAGE_CONFIG"
          fi
          FBEOF
          chmod +x /opt/cupcake/first-boot.sh
          chown root:root /opt/cupcake/first-boot.sh

          cd /opt/cupcake/backend
          set -a
          source /opt/cupcake/.env
          set +a
          /opt/cupcake/venv/bin/python manage.py migrate
          /opt/cupcake/venv/bin/python manage.py collectstatic --noinput

          DJANGO_SUPERUSER_USERNAME=admin \
          DJANGO_SUPERUSER_EMAIL=admin@cupcake.local \
          DJANGO_SUPERUSER_PASSWORD=cupcake \
          /opt/cupcake/venv/bin/python manage.py createsuperuser --noinput

          echo "=== CUPCAKE: restoring seed database ==="
          su - postgres -c "psql -c \"SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname='cupcake_vanilla_db';\""
          su - postgres -c "psql -c \"DROP DATABASE IF EXISTS cupcake_vanilla_db;\""
          su - postgres -c "psql -c \"CREATE DATABASE cupcake_vanilla_db OWNER cupcake_vanilla;\""
          gunzip -c /tmp/cupcake-seed.sql.gz | su - postgres -c "psql cupcake_vanilla_db"
          rm -f /tmp/cupcake-seed.sql.gz

          BACKEND_COMMIT=$(git -C /opt/cupcake/backend rev-parse --short HEAD 2>/dev/null || echo "unknown")
          WEBGUI_COMMIT=$(grep "^WEBGUI_COMMIT=" /opt/cupcake/.frontend-versions 2>/dev/null | cut -d= -f2-)
          VANILLA_NG_COMMIT=$(grep "^VANILLA_NG_COMMIT=" /opt/cupcake/.frontend-versions 2>/dev/null | cut -d= -f2-)
          cat > /opt/cupcake/versions.txt << VEREOF
          BACKEND_REF=master
          BACKEND_COMMIT=${BACKEND_COMMIT}
          WEBGUI_REF=master
          WEBGUI_COMMIT=${WEBGUI_COMMIT:-unknown}
          VANILLA_NG_REF=master
          VANILLA_NG_COMMIT=${VANILLA_NG_COMMIT:-unknown}
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LAST_UPDATE=
          VEREOF
          rm -f /opt/cupcake/.frontend-versions
          chown cupcake-svc:cupcake-svc /opt/cupcake/versions.txt

          echo "=== CUPCAKE: deploying nginx ==="
          mkdir -p /etc/ssl/cupcake
          openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
              -keyout /etc/ssl/cupcake/cupcake.key \
              -out /etc/ssl/cupcake/cupcake.crt \
              -subj "/CN=cupcake.local/O=Cupcake Appliance" \
              -addext "subjectAltName=DNS:cupcake.local,DNS:cupcake,DNS:vanilla.local,DNS:vanilla,DNS:localhost,IP:127.0.0.1"
          chmod 640 /etc/ssl/cupcake/cupcake.key

          cat > /etc/nginx/snippets/cupcake-ssl.conf << SSLEOF
          ssl_certificate     /etc/ssl/cupcake/cupcake.crt;
          ssl_certificate_key /etc/ssl/cupcake/cupcake.key;
          ssl_protocols       TLSv1.2 TLSv1.3;
          ssl_ciphers         HIGH:!aNULL:!MD5;
          ssl_session_cache   shared:SSL:10m;
          ssl_session_timeout 10m;
          SSLEOF

          cat > /etc/nginx/conf.d/cupcake-upstream.conf << NGXEOF
          upstream django_backend {
              server 127.0.0.1:8000;
          }
          NGXEOF

          cat > /etc/nginx/sites-available/cupcake.conf << NGXEOF
          server {
              listen 80 default_server;
              listen 443 ssl default_server;
              server_name cupcake.local cupcake _;
              include /etc/nginx/snippets/cupcake-ssl.conf;
              client_max_body_size 2G;
              root /opt/cupcake/webgui;
              index index.html;

              gzip on;
              gzip_types text/css application/javascript application/json image/svg+xml;
              gzip_vary on;

              location / {
                  try_files \$uri \$uri/ /index.html;
              }

              location /api/ {
                  proxy_pass http://django_backend;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
                  proxy_read_timeout 300s;
              }

              location /admin/ {
                  proxy_pass http://django_backend;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
              }

              location /ws/ {
                  proxy_pass http://django_backend;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade \$http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_read_timeout 86400s;
              }

              location /static/ {
                  alias /opt/cupcake/backend/staticfiles/;
                  expires 7d;
              }

              location /media/ {
                  alias /opt/cupcake/backend/media/;
                  expires 7d;
              }

              location /internal/media/ {
                  internal;
                  alias /opt/cupcake/backend/media/;
              }
          }
          NGXEOF

          cat > /etc/nginx/sites-available/vanilla.conf << NGXEOF
          server {
              listen 80;
              listen 443 ssl;
              server_name vanilla.local vanilla localhost;
              include /etc/nginx/snippets/cupcake-ssl.conf;
              client_max_body_size 2G;
              root /opt/cupcake/vanilla;
              index index.html;

              gzip on;
              gzip_types text/css application/javascript application/json image/svg+xml;
              gzip_vary on;

              location / {
                  try_files \$uri \$uri/ /index.html;
              }

              location /api/ {
                  proxy_pass http://django_backend;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
                  proxy_read_timeout 300s;
              }

              location /admin/ {
                  proxy_pass http://django_backend;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
              }

              location /ws/ {
                  proxy_pass http://django_backend;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade \$http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_read_timeout 86400s;
              }

              location /static/ {
                  alias /opt/cupcake/backend/staticfiles/;
                  expires 7d;
              }

              location /media/ {
                  alias /opt/cupcake/backend/media/;
                  expires 7d;
              }

              location /internal/media/ {
                  internal;
                  alias /opt/cupcake/backend/media/;
              }
          }
          NGXEOF

          ln -sf /etc/nginx/sites-available/cupcake.conf /etc/nginx/sites-enabled/
          ln -sf /etc/nginx/sites-available/vanilla.conf /etc/nginx/sites-enabled/
          rm -f /etc/nginx/sites-enabled/default

          echo "=== CUPCAKE: deploying systemd ==="
          cat > /etc/systemd/system/cupcake-firstboot.service << 'UNITEOF'
          [Unit]
          Description=Cupcake First Boot Setup
          After=network-online.target local-fs.target
          Wants=network-online.target
          Before=cupcake-backend.service

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          User=root
          ExecStart=/opt/cupcake/first-boot.sh

          [Install]
          WantedBy=multi-user.target
          UNITEOF

          systemctl --root=/ enable cupcake-firstboot.service

          cat > /etc/systemd/system/cupcake-backend.service << 'UNITEOF'
          [Unit]
          Description=Cupcake Django Backend
          After=network.target postgresql.service redis-server.service cupcake-firstboot.service
          Requires=postgresql.service redis-server.service
          Wants=cupcake-firstboot.service

          [Service]
          Type=simple
          User=cupcake-svc
          Group=cupcake-svc
          WorkingDirectory=/opt/cupcake/backend
          EnvironmentFile=/opt/cupcake/.env
          ExecStart=/opt/cupcake/venv/bin/gunicorn cupcake_vanilla.asgi:application \
              --bind 127.0.0.1:8000 --workers 4 --timeout 300 \
              -k uvicorn.workers.UvicornWorker --log-level info
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          UNITEOF

          systemctl --root=/ enable cupcake-backend.service

          cat > /etc/systemd/system/cupcake-rqworker.service << 'UNITEOF'
          [Unit]
          Description=Cupcake RQ Worker (default high low)
          After=cupcake-backend.service
          Requires=cupcake-backend.service

          [Service]
          Type=simple
          User=cupcake-svc
          Group=cupcake-svc
          WorkingDirectory=/opt/cupcake/backend
          EnvironmentFile=/opt/cupcake/.env
          ExecStartPre=/opt/cupcake/venv/bin/python manage.py cleanup_dead_workers
          ExecStart=/opt/cupcake/venv/bin/python manage.py rqworker default high low
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          UNITEOF

          systemctl --root=/ enable cupcake-rqworker.service

          cat > /etc/systemd/system/cupcake-transcribe-worker.service << 'UNITEOF'
          [Unit]
          Description=Cupcake Transcribe Worker
          After=cupcake-backend.service
          Requires=cupcake-backend.service

          [Service]
          Type=simple
          User=cupcake-svc
          Group=cupcake-svc
          WorkingDirectory=/opt/cupcake/backend
          EnvironmentFile=/opt/cupcake/.env
          ExecStartPre=/opt/cupcake/venv/bin/python manage.py cleanup_dead_workers
          ExecStart=/opt/cupcake/venv/bin/python manage.py rqworker transcribe
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          UNITEOF

          systemctl --root=/ enable cupcake-transcribe-worker.service

          echo "=== CUPCAKE: deploying mDNS ==="
          cat > /etc/avahi/services/cupcake.service << 'AVHEOF'
          <?xml version="1.0" standalone='no'?>
          <!DOCTYPE service-group SYSTEM "avahi-service.dtd">
          <service-group>
            <name>Cupcake Appliance</name>
            <service>
              <type>_http._tcp</type>
              <port>80</port>
              <txt-record>path=/</txt-record>
            </service>
          </service-group>
          AVHEOF

          cat > /etc/avahi/services/vanilla.service << 'AVHEOF'
          <?xml version="1.0" standalone='no'?>
          <!DOCTYPE service-group SYSTEM "avahi-service.dtd">
          <service-group>
            <name>Cupcake Vanilla Interface</name>
            <service>
              <type>_http._tcp</type>
              <port>80</port>
              <txt-record>path=/</txt-record>
            </service>
          </service-group>
          AVHEOF

          cat > /usr/local/bin/avahi-publish-vanilla.sh << 'AVHEOF'
          #!/bin/bash
          IP=$(ip -4 route get 1.1.1.1 2>/dev/null | awk '/src/{print $NF; exit}')
          [ -z "$IP" ] && IP=$(hostname -I | awk '{print $1}')
          exec /usr/bin/avahi-publish -a -R vanilla.local "$IP"
          AVHEOF
          chmod +x /usr/local/bin/avahi-publish-vanilla.sh

          cat > /etc/systemd/system/avahi-alias-vanilla.service << 'UNITEOF'
          [Unit]
          Description=Publish vanilla.local mDNS alias
          After=avahi-daemon.service network-online.target
          Requires=avahi-daemon.service

          [Service]
          Type=simple
          ExecStart=/usr/local/bin/avahi-publish-vanilla.sh
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          UNITEOF

          systemctl --root=/ enable avahi-alias-vanilla.service

          chown -R cupcake-svc:cupcake-svc /opt/cupcake /var/log/cupcake
          chown root:cupcake-svc /opt/cupcake/.env
          chmod 640 /opt/cupcake/.env

          echo "=== CUPCAKE: stopping services ==="
          service postgresql stop || \
            pg_ctlcluster "$(pg_lsclusters -h | head -1 | awk '{print $1, $2}')" stop || true

          echo "=== CUPCAKE: done ==="
          EOF

          echo "IMG_SUFFIX=-cupcake" > pi-gen/stage2a/EXPORT_IMAGE
          chmod +x pi-gen/stage2a/prerun.sh \
            pi-gen/stage2a/00-install-cupcake/00-run.sh \
            pi-gen/stage2a/00-install-cupcake/01-run-chroot.sh

          touch pi-gen/stage3/SKIP pi-gen/stage4/SKIP pi-gen/stage5/SKIP

          cat > pi-gen/config << 'CFGEOF'
          IMG_NAME=cupcake-pi
          RELEASE=trixie
          DEPLOY_COMPRESSION=xz
          COMPRESSION_LEVEL=9
          LOCALE_DEFAULT=en_US.UTF-8
          TARGET_HOSTNAME=cupcake
          KEYBOARD_KEYMAP=gb
          KEYBOARD_LAYOUT="English (UK)"
          TIMEZONE_DEFAULT=UTC
          FIRST_USER_NAME=cupcake
          FIRST_USER_PASS=cupcake123
          ENABLE_SSH=1
          STAGE_LIST="stage0 stage1 stage2 stage2a"
          BOOTSTRAP_KEYRING=debian-archive-keyring
          CFGEOF

      - name: Build
        timeout-minutes: 180
        run: |
          cd pi-gen
          export DEBOOTSTRAP_QEMU_USER_STATIC=/usr/bin/qemu-aarch64-static
          sudo -E USE_DOCKER=0 ./build.sh

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: cupcake-pi-arm64
          path: pi-gen/deploy/*.img.xz
          retention-days: 30

  summary:
    name: Summary
    needs: [build-db, build-frontend, build-vm, build-rpi]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## Cupcake Appliance Images" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Seed DB | ${{ needs.build-db.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| VM (amd64) | ${{ needs.build-vm.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| RPi (arm64) | ${{ needs.build-rpi.result }} |" >> $GITHUB_STEP_SUMMARY
