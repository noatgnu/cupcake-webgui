name: Build Appliance Images

on:
  workflow_dispatch:
    inputs:
      image_type:
        description: 'Image type'
        type: choice
        default: 'both'
        options: [vm, rpi, both]
      backend_ref:
        description: 'Backend branch/tag (cupcake_vanilla)'
        type: string
        default: 'master'
      webgui_ref:
        description: 'WebGUI branch/tag (cupcake-webgui)'
        type: string
        default: 'master'
      vanilla_ng_ref:
        description: 'Vanilla NG branch/tag (cupcake-vanilla-ng)'
        type: string
        default: 'master'
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-frontend:
    name: Pre-build Frontends
    if: github.event_name == 'release' || inputs.image_type != 'vm'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build cupcake-webgui
        env:
          WEBGUI_REF: ${{ inputs.webgui_ref || 'master' }}
        run: |
          git clone --depth 1 --branch "$WEBGUI_REF" https://github.com/noatgnu/cupcake-webgui.git /tmp/webgui
          cd /tmp/webgui
          npm ci
          npx ng build --configuration=appliance --base-href /
          mkdir -p "$GITHUB_WORKSPACE/frontend/webgui"
          cp -r dist/cupcake/browser/* "$GITHUB_WORKSPACE/frontend/webgui/"

      - name: Build cupcake-vanilla-ng
        env:
          VANILLA_NG_REF: ${{ inputs.vanilla_ng_ref || 'master' }}
        run: |
          git clone --depth 1 --branch "$VANILLA_NG_REF" https://github.com/noatgnu/cupcake-vanilla-ng.git /tmp/vanilla-ng
          cd /tmp/vanilla-ng
          npm ci
          npx ng build @noatgnu/cupcake-core
          npx ng build @noatgnu/cupcake-vanilla
          npx ng build @noatgnu/cupcake-macaron
          npx ng build @noatgnu/cupcake-mint-chocolate
          npx ng build @noatgnu/cupcake-red-velvet
          npx ng build @noatgnu/cupcake-salted-caramel
          npx ng build --configuration=appliance --base-href /
          mkdir -p "$GITHUB_WORKSPACE/frontend/vanilla"
          cp -r dist/cupcake-vanilla-ng/browser/* "$GITHUB_WORKSPACE/frontend/vanilla/"

      - name: Upload webgui
        uses: actions/upload-artifact@v4
        with:
          name: cupcake-webgui-frontend
          path: frontend/webgui/
          retention-days: 1

      - name: Upload vanilla-ng
        uses: actions/upload-artifact@v4
        with:
          name: cupcake-vanilla-ng-frontend
          path: frontend/vanilla/
          retention-days: 1

  build-db:
    name: Build seeded database
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3 python3-venv python3-dev libpq-dev \
            postgresql postgresql-client redis-server
          sudo service redis-server start || true

      - name: Set up PostgreSQL
        run: |
          sudo service postgresql start
          sudo -u postgres psql -c "CREATE USER cupcake_vanilla WITH PASSWORD 'cupcake_vanilla_pass';"
          sudo -u postgres psql -c "CREATE DATABASE cupcake_vanilla_db OWNER cupcake_vanilla;"
          sudo -u postgres psql -c "ALTER USER cupcake_vanilla CREATEDB;"

      - name: Clone backend and install dependencies
        env:
          BACKEND_REF: ${{ inputs.backend_ref || 'master' }}
        run: |
          python3 -m venv /tmp/venv
          /tmp/venv/bin/pip install --upgrade pip --quiet
          git clone --depth 1 --branch "$BACKEND_REF" \
            https://github.com/noatgnu/cupcake_vanilla.git /tmp/backend
          /tmp/venv/bin/pip install -r /tmp/backend/requirements.txt --quiet

      - name: Migrate and create superuser
        env:
          POSTGRES_DB: cupcake_vanilla_db
          POSTGRES_USER: cupcake_vanilla
          POSTGRES_PASSWORD: cupcake_vanilla_pass
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: '5432'
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: '6379'
          DJANGO_SETTINGS_MODULE: cupcake_vanilla.settings
          SECRET_KEY: build-time-only-not-used-in-production
          DEBUG: 'False'
          ENABLE_CUPCAKE_MACARON: 'True'
          ENABLE_CUPCAKE_MINT_CHOCOLATE: 'True'
          ENABLE_CUPCAKE_SALTED_CARAMEL: 'True'
          ENABLE_CUPCAKE_RED_VELVET: 'True'
          ALLOWED_HOSTS: localhost
        run: |
          cd /tmp/backend
          /tmp/venv/bin/python manage.py migrate --noinput
          DJANGO_SUPERUSER_USERNAME=admin \
          DJANGO_SUPERUSER_EMAIL=admin@cupcake.local \
          DJANGO_SUPERUSER_PASSWORD=cupcake \
          /tmp/venv/bin/python manage.py createsuperuser --noinput

      - name: Load ontologies
        timeout-minutes: 240
        env:
          POSTGRES_DB: cupcake_vanilla_db
          POSTGRES_USER: cupcake_vanilla
          POSTGRES_PASSWORD: cupcake_vanilla_pass
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: '5432'
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: '6379'
          DJANGO_SETTINGS_MODULE: cupcake_vanilla.settings
          SECRET_KEY: build-time-only-not-used-in-production
          DEBUG: 'False'
          ENABLE_CUPCAKE_MACARON: 'True'
          ENABLE_CUPCAKE_MINT_CHOCOLATE: 'True'
          ENABLE_CUPCAKE_SALTED_CARAMEL: 'True'
          ENABLE_CUPCAKE_RED_VELVET: 'True'
          ALLOWED_HOSTS: localhost
        run: |
          cd /tmp/backend
          MANAGE="/tmp/venv/bin/python manage.py"
          $MANAGE load_species
          $MANAGE load_tissue
          $MANAGE load_human_disease
          $MANAGE load_subcellular_location
          $MANAGE load_ms_mod
          $MANAGE load_ms_term
          $MANAGE load_ontologies --ontology all --no-limit
          $MANAGE sync_schemas
          $MANAGE load_column_templates

      - name: Dump database
        run: |
          PGPASSWORD=cupcake_vanilla_pass pg_dump \
            -h 127.0.0.1 -U cupcake_vanilla \
            --format=plain \
            cupcake_vanilla_db \
            | gzip -6 > cupcake-seed.sql.gz
          echo "Seed dump size: $(du -sh cupcake-seed.sql.gz | cut -f1)"

      - name: Upload seed database
        uses: actions/upload-artifact@v4
        with:
          name: cupcake-seed-db
          path: cupcake-seed.sql.gz
          retention-days: 1

  build-vm:
    name: VM Image (${{ matrix.distro }}, amd64)
    if: github.event_name != 'release' && inputs.image_type != 'rpi'
    needs: build-db
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu
            image_url: https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img
            python_version: "3.12"
          - distro: debian
            image_url: https://cloud.debian.org/images/cloud/trixie/daily/latest/debian-13-genericcloud-amd64-daily.qcow2
            python_version: "3.13"
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils cloud-image-utils genisoimage wget openssh-client \
            iproute2 avahi-daemon avahi-utils libnss-mdns

      - name: Fix /dev/kvm permissions
        run: sudo chmod 666 /dev/kvm 2>/dev/null || true

      - name: Setup test bridge network
        run: |
          sudo ip link add br0 type bridge stp_state 0 forward_delay 0
          sudo ip link set br0 promisc on
          sudo ip link set br0 type bridge mcast_snooping 0
          sudo ip link set br0 up
          sudo ip addr add 10.0.5.1/24 dev br0
          sudo ip tuntap add dev cupcake-tap mode tap
          sudo ip link set cupcake-tap master br0
          sudo ip link set cupcake-tap promisc on
          sudo ip link set cupcake-tap up
          sudo systemctl restart avahi-daemon
          sudo sed -i 's/^hosts:.*/hosts: files mdns4_minimal [NOTFOUND=return] dns/' /etc/nsswitch.conf

      - name: Generate SSH key
        run: |
          ssh-keygen -t ed25519 -f cupckey -N '' -q
          echo "SSH_PUBKEY=$(cat cupckey.pub)" >> $GITHUB_ENV

      - name: Download ${{ matrix.distro }} cloud image
        run: |
          wget -q --show-progress "${{ matrix.image_url }}" -O vm-disk.qcow2
          qemu-img resize vm-disk.qcow2 20G

      - name: Create cloud-init seed
        run: |
          sed "s|SSH_PUBKEY_PLACEHOLDER|${SSH_PUBKEY}|" \
            "$GITHUB_WORKSPACE/provision/http/cloud-init-user-data.tmpl" > ci-user-data
          cloud-localds seed.iso ci-user-data provision/http/meta-data

      - name: Boot VM and wait for SSH
        timeout-minutes: 10
        run: |
          qemu-system-x86_64 \
            -m 4096 -smp 2 \
            -drive file=vm-disk.qcow2,format=qcow2,if=virtio \
            -drive file=seed.iso,format=raw,if=virtio \
            -netdev user,id=net0,hostfwd=tcp::2222-:22,hostfwd=tcp::8080-:80,hostfwd=tcp::8443-:443 \
            -device virtio-net-pci,netdev=net0 \
            -netdev tap,id=net1,ifname=cupcake-tap,script=no,downscript=no \
            -device virtio-net-pci,netdev=net1 \
            -machine type=pc,accel=kvm -cpu host \
            -display none -serial file:serial.log &
          QEMU_PID=$!
          echo "QEMU_PID=$QEMU_PID" >> $GITHUB_ENV

          for i in $(seq 1 60); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=3 -i cupckey -p 2222 cupcake@localhost 'echo OK' 2>/dev/null; then
              echo "SSH ready (${i}x5s)"
              exit 0
            fi
            sleep 5
          done
          echo "=== SSH never came up. Serial console output: ==="
          cat serial.log 2>/dev/null | tail -50
          kill $QEMU_PID 2>/dev/null || true
          exit 1

      - name: Configure bridge NIC on VM
        run: |
          ssh -o StrictHostKeyChecking=no -i cupckey -p 2222 cupcake@localhost << 'ENDSSH'
          NIC=$(ip -o link show | awk -F': ' '!/LOOPBACK/{print $2}' | while read iface; do
            [ "$iface" = lo ] && continue
            ip -4 addr show "$iface" 2>/dev/null | grep -q "inet " || echo "$iface"
          done | head -1)
          if [ -z "$NIC" ]; then echo "ERROR: bridge NIC not found"; ip link show; exit 1; fi
          sudo ip addr add 10.0.5.10/24 dev "$NIC"
          sudo ip link set "$NIC" up
          echo "Bridge NIC configured: $NIC -> 10.0.5.10"
          ENDSSH
          echo "10.0.5.10 vanilla.local" | sudo tee -a /etc/hosts

      - name: Provision — 01-base + 07-mdns
        timeout-minutes: 10
        run: |
          BACKEND_REF="${{ inputs.backend_ref || 'master' }}"
          scp -o StrictHostKeyChecking=no -i cupckey -P 2222 \
            provision/scripts/cupcake-vanilla-mdns.py cupcake@localhost:/tmp/
          PYTHON_VERSION="${{ matrix.python_version }}"
          for s in 01-base 07-mdns; do
            scp -o StrictHostKeyChecking=no -i cupckey -P 2222 provision/scripts/${s}.sh cupcake@localhost:/tmp/
            ssh -o StrictHostKeyChecking=no -i cupckey -p 2222 cupcake@localhost \
              "chmod +x /tmp/${s}.sh && sudo env BACKEND_REF='${BACKEND_REF}' PYTHON_VERSION='${PYTHON_VERSION}' /tmp/${s}.sh"
          done

      - name: mDNS check — 01-base + 07-mdns
        run: |
          for i in $(seq 1 15); do
            C_IP=$(avahi-resolve --name cupcake.local 2>/dev/null | awk '{print $2}')
            V_IP=$(getent hosts vanilla.local 2>/dev/null | awk '{print $1}')
            if [ -n "$C_IP" ] && [ -n "$V_IP" ]; then
              echo "OK: cupcake.local=$C_IP vanilla.local=$V_IP"; exit 0
            fi
            sleep 2
          done
          echo "FAIL: cupcake.local=${C_IP:-missing} vanilla.local=${V_IP:-missing}"; exit 1

      - name: Provision — 02-postgresql
        timeout-minutes: 10
        run: |
          scp -o StrictHostKeyChecking=no -i cupckey -P 2222 provision/scripts/02-postgresql.sh cupcake@localhost:/tmp/
          ssh -o StrictHostKeyChecking=no -i cupckey -p 2222 cupcake@localhost \
            "chmod +x /tmp/02-postgresql.sh && sudo /tmp/02-postgresql.sh"

      - name: mDNS check — 02-postgresql
        run: |
          for i in $(seq 1 15); do
            C_IP=$(avahi-resolve --name cupcake.local 2>/dev/null | awk '{print $2}')
            V_IP=$(getent hosts vanilla.local 2>/dev/null | awk '{print $1}')
            if [ -n "$C_IP" ] && [ -n "$V_IP" ]; then
              echo "OK: cupcake.local=$C_IP vanilla.local=$V_IP"; exit 0
            fi
            sleep 2
          done
          echo "FAIL: cupcake.local=${C_IP:-missing} vanilla.local=${V_IP:-missing}"; exit 1

      - name: Provision — 03-redis
        timeout-minutes: 5
        run: |
          scp -o StrictHostKeyChecking=no -i cupckey -P 2222 provision/scripts/03-redis.sh cupcake@localhost:/tmp/
          ssh -o StrictHostKeyChecking=no -i cupckey -p 2222 cupcake@localhost \
            "chmod +x /tmp/03-redis.sh && sudo /tmp/03-redis.sh"

      - name: mDNS check — 03-redis
        run: |
          for i in $(seq 1 15); do
            C_IP=$(avahi-resolve --name cupcake.local 2>/dev/null | awk '{print $2}')
            V_IP=$(getent hosts vanilla.local 2>/dev/null | awk '{print $1}')
            if [ -n "$C_IP" ] && [ -n "$V_IP" ]; then
              echo "OK: cupcake.local=$C_IP vanilla.local=$V_IP"; exit 0
            fi
            sleep 2
          done
          echo "FAIL: cupcake.local=${C_IP:-missing} vanilla.local=${V_IP:-missing}"; exit 1

      - name: Provision — 04-backend
        timeout-minutes: 20
        run: |
          BACKEND_REF="${{ inputs.backend_ref || 'master' }}"
          scp -o StrictHostKeyChecking=no -i cupckey -P 2222 provision/scripts/04-backend.sh cupcake@localhost:/tmp/
          ssh -o StrictHostKeyChecking=no -i cupckey -p 2222 cupcake@localhost \
            "chmod +x /tmp/04-backend.sh && sudo env BACKEND_REF='${BACKEND_REF}' PYTHON_VERSION='${{ matrix.python_version }}' /tmp/04-backend.sh"

      - name: mDNS check — 04-backend
        run: |
          for i in $(seq 1 15); do
            C_IP=$(avahi-resolve --name cupcake.local 2>/dev/null | awk '{print $2}')
            V_IP=$(getent hosts vanilla.local 2>/dev/null | awk '{print $1}')
            if [ -n "$C_IP" ] && [ -n "$V_IP" ]; then
              echo "OK: cupcake.local=$C_IP vanilla.local=$V_IP"; exit 0
            fi
            sleep 2
          done
          echo "FAIL: cupcake.local=${C_IP:-missing} vanilla.local=${V_IP:-missing}"; exit 1

      - name: Provision — 10-tailscale
        timeout-minutes: 10
        run: |
          scp -o StrictHostKeyChecking=no -i cupckey -P 2222 provision/scripts/10-tailscale.sh cupcake@localhost:/tmp/
          ssh -o StrictHostKeyChecking=no -i cupckey -p 2222 cupcake@localhost \
            "chmod +x /tmp/10-tailscale.sh && sudo /tmp/10-tailscale.sh"

      - name: mDNS check — 10-tailscale
        run: |
          for i in $(seq 1 15); do
            C_IP=$(avahi-resolve --name cupcake.local 2>/dev/null | awk '{print $2}')
            V_IP=$(getent hosts vanilla.local 2>/dev/null | awk '{print $1}')
            if [ -n "$C_IP" ] && [ -n "$V_IP" ]; then
              echo "OK: cupcake.local=$C_IP vanilla.local=$V_IP"; exit 0
            fi
            sleep 2
          done
          echo "FAIL: cupcake.local=${C_IP:-missing} vanilla.local=${V_IP:-missing}"; exit 1

      - name: Provision — 11-cloudflared
        timeout-minutes: 10
        run: |
          scp -o StrictHostKeyChecking=no -i cupckey -P 2222 provision/scripts/11-cloudflared.sh cupcake@localhost:/tmp/
          ssh -o StrictHostKeyChecking=no -i cupckey -p 2222 cupcake@localhost \
            "chmod +x /tmp/11-cloudflared.sh && sudo /tmp/11-cloudflared.sh"

      - name: mDNS check — 11-cloudflared
        run: |
          for i in $(seq 1 15); do
            C_IP=$(avahi-resolve --name cupcake.local 2>/dev/null | awk '{print $2}')
            V_IP=$(getent hosts vanilla.local 2>/dev/null | awk '{print $1}')
            if [ -n "$C_IP" ] && [ -n "$V_IP" ]; then
              echo "OK: cupcake.local=$C_IP vanilla.local=$V_IP"; exit 0
            fi
            sleep 2
          done
          echo "FAIL: cupcake.local=${C_IP:-missing} vanilla.local=${V_IP:-missing}"; exit 1

      - name: Provision — 12-coturn
        timeout-minutes: 5
        run: |
          scp -o StrictHostKeyChecking=no -i cupckey -P 2222 provision/scripts/12-coturn.sh cupcake@localhost:/tmp/
          ssh -o StrictHostKeyChecking=no -i cupckey -p 2222 cupcake@localhost \
            "chmod +x /tmp/12-coturn.sh && sudo /tmp/12-coturn.sh"

      - name: mDNS check — 12-coturn
        run: |
          for i in $(seq 1 15); do
            C_IP=$(avahi-resolve --name cupcake.local 2>/dev/null | awk '{print $2}')
            V_IP=$(getent hosts vanilla.local 2>/dev/null | awk '{print $1}')
            if [ -n "$C_IP" ] && [ -n "$V_IP" ]; then
              echo "OK: cupcake.local=$C_IP vanilla.local=$V_IP"; exit 0
            fi
            sleep 2
          done
          echo "FAIL: cupcake.local=${C_IP:-missing} vanilla.local=${V_IP:-missing}"; exit 1

      - name: Provision — 13-storage-manager
        timeout-minutes: 5
        run: |
          for f in configure-storage.sh cupcake-storage-manager cupcake-storage-manager.socket cupcake-storage-manager.service 13-storage-manager.sh; do
            scp -o StrictHostKeyChecking=no -i cupckey -P 2222 provision/scripts/$f cupcake@localhost:/tmp/
          done
          ssh -o StrictHostKeyChecking=no -i cupckey -p 2222 cupcake@localhost \
            "chmod +x /tmp/13-storage-manager.sh && sudo /tmp/13-storage-manager.sh"

      - name: Provision — 14-network-manager
        timeout-minutes: 5
        run: |
          for f in configure-wifi.sh cupcake-network-manager cupcake-network-manager.socket cupcake-network-manager.service 14-network-manager.sh; do
            scp -o StrictHostKeyChecking=no -i cupckey -P 2222 provision/scripts/$f cupcake@localhost:/tmp/
          done
          ssh -o StrictHostKeyChecking=no -i cupckey -p 2222 cupcake@localhost \
            "chmod +x /tmp/14-network-manager.sh && sudo /tmp/14-network-manager.sh"

      - name: Provision — 15-plugin
        timeout-minutes: 5
        run: |
          for f in cupcake-plugin-manager cupcake-plugin cupcake-plugin-manager.socket cupcake-plugin-manager.service 15-plugin.sh; do
            scp -o StrictHostKeyChecking=no -i cupckey -P 2222 provision/scripts/$f cupcake@localhost:/tmp/
          done
          ssh -o StrictHostKeyChecking=no -i cupckey -p 2222 cupcake@localhost \
            "chmod +x /tmp/15-plugin.sh && sudo /tmp/15-plugin.sh"

      - name: Download seed database
        uses: actions/download-artifact@v4
        with:
          name: cupcake-seed-db

      - name: Restore seed database
        timeout-minutes: 30
        run: |
          scp -o StrictHostKeyChecking=no -i cupckey -P 2222 \
            cupcake-seed.sql.gz provision/scripts/restore-seed.sh cupcake@localhost:/tmp/
          ssh -o StrictHostKeyChecking=no -i cupckey -p 2222 cupcake@localhost \
            "chmod +x /tmp/restore-seed.sh && sudo /tmp/restore-seed.sh"

      - name: mDNS check — seed restore
        run: |
          for i in $(seq 1 15); do
            C_IP=$(avahi-resolve --name cupcake.local 2>/dev/null | awk '{print $2}')
            V_IP=$(getent hosts vanilla.local 2>/dev/null | awk '{print $1}')
            if [ -n "$C_IP" ] && [ -n "$V_IP" ]; then
              echo "OK: cupcake.local=$C_IP vanilla.local=$V_IP"; exit 0
            fi
            sleep 2
          done
          echo "FAIL: cupcake.local=${C_IP:-missing} vanilla.local=${V_IP:-missing}"; exit 1

      - name: Provision — 05-frontend
        timeout-minutes: 60
        run: |
          WEBGUI_REF="${{ inputs.webgui_ref || 'master' }}"
          VANILLA_NG_REF="${{ inputs.vanilla_ng_ref || 'master' }}"
          scp -o StrictHostKeyChecking=no -i cupckey -P 2222 provision/scripts/05-frontend.sh cupcake@localhost:/tmp/
          ssh -o StrictHostKeyChecking=no -i cupckey -p 2222 cupcake@localhost \
            "chmod +x /tmp/05-frontend.sh && sudo env WEBGUI_REF='${WEBGUI_REF}' VANILLA_NG_REF='${VANILLA_NG_REF}' /tmp/05-frontend.sh"

      - name: mDNS check — 05-frontend
        run: |
          for i in $(seq 1 15); do
            C_IP=$(avahi-resolve --name cupcake.local 2>/dev/null | awk '{print $2}')
            V_IP=$(getent hosts vanilla.local 2>/dev/null | awk '{print $1}')
            if [ -n "$C_IP" ] && [ -n "$V_IP" ]; then
              echo "OK: cupcake.local=$C_IP vanilla.local=$V_IP"; exit 0
            fi
            sleep 2
          done
          echo "FAIL: cupcake.local=${C_IP:-missing} vanilla.local=${V_IP:-missing}"; exit 1

      - name: Provision — 06-nginx
        timeout-minutes: 5
        run: |
          scp -o StrictHostKeyChecking=no -i cupckey -P 2222 provision/scripts/06-nginx.sh cupcake@localhost:/tmp/
          ssh -o StrictHostKeyChecking=no -i cupckey -p 2222 cupcake@localhost \
            "chmod +x /tmp/06-nginx.sh && sudo /tmp/06-nginx.sh"

      - name: mDNS check — 06-nginx
        run: |
          for i in $(seq 1 15); do
            C_IP=$(avahi-resolve --name cupcake.local 2>/dev/null | awk '{print $2}')
            V_IP=$(getent hosts vanilla.local 2>/dev/null | awk '{print $1}')
            if [ -n "$C_IP" ] && [ -n "$V_IP" ]; then
              echo "OK: cupcake.local=$C_IP vanilla.local=$V_IP"; exit 0
            fi
            sleep 2
          done
          echo "FAIL: cupcake.local=${C_IP:-missing} vanilla.local=${V_IP:-missing}"; exit 1

      - name: Provision — 08-cleanup
        timeout-minutes: 10
        run: |
          scp -o StrictHostKeyChecking=no -i cupckey -P 2222 \
            provision/scripts/08-cleanup.sh \
            provision/scripts/update.sh \
            provision/scripts/configure-tailscale.sh \
            provision/scripts/configure-cloudflared.sh \
            provision/scripts/configure-storage.sh \
            cupcake@localhost:/tmp/
          scp -o StrictHostKeyChecking=no -i cupckey -P 2222 -r \
            provision/config-examples \
            cupcake@localhost:/tmp/
          ssh -o StrictHostKeyChecking=no -i cupckey -p 2222 cupcake@localhost \
            "chmod +x /tmp/08-cleanup.sh && sudo env /tmp/08-cleanup.sh"

      - name: mDNS check — 08-cleanup
        run: |
          for i in $(seq 1 15); do
            C_IP=$(avahi-resolve --name cupcake.local 2>/dev/null | awk '{print $2}')
            V_IP=$(getent hosts vanilla.local 2>/dev/null | awk '{print $1}')
            if [ -n "$C_IP" ] && [ -n "$V_IP" ]; then
              echo "OK: cupcake.local=$C_IP vanilla.local=$V_IP"; exit 0
            fi
            sleep 2
          done
          echo "FAIL: cupcake.local=${C_IP:-missing} vanilla.local=${V_IP:-missing}"; exit 1

      - name: Start services
        run: |
          ssh -o StrictHostKeyChecking=no -i cupckey -p 2222 cupcake@localhost \
            "sudo systemctl start postgresql redis-server nginx cupcake-backend"

      - name: mDNS check — start services
        run: |
          for i in $(seq 1 15); do
            C_IP=$(avahi-resolve --name cupcake.local 2>/dev/null | awk '{print $2}')
            V_IP=$(getent hosts vanilla.local 2>/dev/null | awk '{print $1}')
            if [ -n "$C_IP" ] && [ -n "$V_IP" ]; then
              echo "OK: cupcake.local=$C_IP vanilla.local=$V_IP"; exit 0
            fi
            sleep 2
          done
          echo "FAIL: cupcake.local=${C_IP:-missing} vanilla.local=${V_IP:-missing}"; exit 1

      - name: Start workers
        run: |
          for i in $(seq 1 20); do
            code=$(ssh -o StrictHostKeyChecking=no -i cupckey -p 2222 cupcake@localhost \
              "curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8000/api/v1/" 2>/dev/null) || true
            if echo "$code" | grep -qE "^[234][0-9][0-9]$"; then
              echo "Backend ready after ${i}x3s"
              break
            fi
            sleep 3
          done
          ssh -o StrictHostKeyChecking=no -i cupckey -p 2222 cupcake@localhost \
            "sudo systemctl start cupcake-rqworker cupcake-transcribe-worker"

      - name: Smoke test
        timeout-minutes: 10
        run: |
          scp -o StrictHostKeyChecking=no -i cupckey -P 2222 \
            provision/scripts/09-smoke-test.sh cupcake@localhost:/tmp/
          ssh -o StrictHostKeyChecking=no -i cupckey -p 2222 cupcake@localhost \
            "chmod +x /tmp/09-smoke-test.sh && sudo /tmp/09-smoke-test.sh"

      - name: Plugin manager test
        timeout-minutes: 10
        run: |
          scp -o StrictHostKeyChecking=no -i cupckey -P 2222 \
            provision/scripts/test-plugin-manager.sh cupcake@localhost:/tmp/
          ssh -o StrictHostKeyChecking=no -i cupckey -p 2222 cupcake@localhost \
            "chmod +x /tmp/test-plugin-manager.sh && sudo /tmp/test-plugin-manager.sh"

      - name: UI smoke test
        timeout-minutes: 15
        run: |
          fail() { echo "FAIL: $*"; exit 1; }

          echo "Waiting for mDNS resolution..."
          for i in $(seq 1 30); do
            C_IP=$(avahi-resolve --name cupcake.local 2>/dev/null | awk '{print $2}')
            V_IP=$(getent hosts vanilla.local 2>/dev/null | awk '{print $1}')
            if [ -n "$C_IP" ] && [ -n "$V_IP" ]; then
              echo "mDNS resolved after ${i}x2s"
              echo "cupcake.local -> $C_IP"
              echo "vanilla.local -> $V_IP"
              RESOLVED=true
              break
            fi
            sleep 2
          done
          [ "${RESOLVED:-false}" = "true" ] || fail "mDNS did not resolve cupcake.local or vanilla.local"

          CUPCAKE=$(curl -sfk https://cupcake.local/) \
            || fail "cupcake.local ($C_IP) did not return 200"
          VANILLA=$(curl -sfk https://vanilla.local/) \
            || fail "vanilla.local ($V_IP) did not return 200"

          echo "$CUPCAKE" | grep -q "<title>Cupcake</title>" \
            || fail "cupcake.local wrong title — wrong frontend deployed"
          echo "$VANILLA" | grep -q "<title>Cupcake Vanilla</title>" \
            || fail "vanilla.local wrong title — wrong frontend deployed"

          API=$(curl -sk -o /dev/null -w "%{http_code}" https://cupcake.local/api/v1/)
          echo "$API" | grep -qE "^[234]" \
            || fail "API at cupcake.local returned unexpected status $API"

          echo "PASS: mDNS resolved, cupcake.local and vanilla.local serve correct frontends"

          mkdir -p /tmp/ui-test && cd /tmp/ui-test
          npm init -y --quiet
          npm install --quiet playwright
          npx playwright install chromium --with-deps

          cp "$GITHUB_WORKSPACE/.github/scripts/ui-test.js" .
          node ui-test.js

      - name: Upload UI test screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-screenshots
          path: /tmp/ui-test/screenshot-*.png
          retention-days: 3

      - name: Remove CI SSH key
        run: |
          ssh -o StrictHostKeyChecking=no -i cupckey -p 2222 cupcake@localhost \
            "sudo rm -f /home/cupcake/.ssh/authorized_keys"

      - name: Shutdown VM
        run: |
          ssh -o StrictHostKeyChecking=no -i cupckey -p 2222 cupcake@localhost 'sudo shutdown -P now' 2>/dev/null || true
          for i in $(seq 1 60); do
            if ! kill -0 $QEMU_PID 2>/dev/null; then
              echo "QEMU exited after ${i}x3s"
              break
            fi
            sleep 33
          done
          kill $QEMU_PID 2>/dev/null || true
          sleep 2

      - name: Compact and compress
        run: |
          qemu-img convert -O qcow2 -c vm-disk.qcow2 cupcake-vm-amd64-${{ matrix.distro }}.qcow2
          xz -3 cupcake-vm-amd64-${{ matrix.distro }}.qcow2
          ls -lh cupcake-vm-amd64-${{ matrix.distro }}.qcow2.xz

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: cupcake-vm-amd64-${{ matrix.distro }}
          path: cupcake-vm-amd64-${{ matrix.distro }}.qcow2.xz
          retention-days: 7
          compression-level: 0

  build-rpi:
    name: RPi Image
    if: github.event_name == 'release' || inputs.image_type != 'vm'
    needs: [build-frontend, build-db]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download webgui frontend
        uses: actions/download-artifact@v4
        with:
          name: cupcake-webgui-frontend
          path: frontend/webgui

      - name: Download vanilla-ng frontend
        uses: actions/download-artifact@v4
        with:
          name: cupcake-vanilla-ng-frontend
          path: frontend/vanilla

      - name: Download seed database
        uses: actions/download-artifact@v4
        with:
          name: cupcake-seed-db

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL /usr/local/lib/python*
          sudo apt-get clean
          df -h

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            coreutils quilt debootstrap zerofree zip dosfstools \
            libarchive-tools rsync xz-utils file git curl bc gpg pigz \
            qemu-user-static binfmt-support arch-test debian-archive-keyring \
            cmake gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Enable ARM64 emulation
        run: |
          sudo modprobe binfmt_misc
          sudo update-binfmts --enable qemu-aarch64 || true
          /usr/bin/qemu-aarch64-static --version

      - name: Clone pi-gen
        run: git clone --depth 1 --branch arm64 https://github.com/RPi-Distro/pi-gen.git

      - name: Patch pi-gen for qemu-user-static compatibility
        run: |
          sed -i 's/qemu-arm:qemu-user-binfmt/qemu-arm-static:qemu-user-static/' pi-gen/depends
          sudo ln -sf /usr/bin/qemu-arm-static /usr/local/bin/qemu-arm

          cat >> pi-gen/stage0/prerun.sh << 'SCRIPT'
          mkdir -p "${ROOTFS_DIR}/usr/share/keyrings"
          cp /usr/share/keyrings/debian-archive-keyring.gpg \
            "${ROOTFS_DIR}/usr/share/keyrings/debian-archive-keyring.pgp"
          SCRIPT

      - name: Create cupcake stage
        run: |
          mkdir -p pi-gen/stage2a/00-install-cupcake

          cat > pi-gen/stage2a/prerun.sh << 'EOF'
          #!/bin/bash -e
          if [ ! -d "${ROOTFS_DIR}" ]; then
            copy_previous
          fi
          EOF

          cat > pi-gen/stage2a/00-install-cupcake/00-run.sh << 'EOF'
          #!/bin/bash -e

          echo "=== CUPCAKE: copying frontend files ==="
          echo "GITHUB_WORKSPACE=${GITHUB_WORKSPACE}"
          echo "ROOTFS_DIR=${ROOTFS_DIR}"
          echo "Webgui source files: $(ls "${GITHUB_WORKSPACE}/frontend/webgui/" | wc -l) items"
          echo "Vanilla source files: $(ls "${GITHUB_WORKSPACE}/frontend/vanilla/" | wc -l) items"

          mkdir -p "${ROOTFS_DIR}/opt/cupcake/webgui"
          mkdir -p "${ROOTFS_DIR}/opt/cupcake/vanilla"
          cp -rT "${GITHUB_WORKSPACE}/frontend/webgui" "${ROOTFS_DIR}/opt/cupcake/webgui"
          cp -rT "${GITHUB_WORKSPACE}/frontend/vanilla" "${ROOTFS_DIR}/opt/cupcake/vanilla"

          WEBGUI_TITLE=$(grep -o '<title>[^<]*</title>' "${ROOTFS_DIR}/opt/cupcake/webgui/index.html" 2>/dev/null || echo "MISSING")
          VANILLA_TITLE=$(grep -o '<title>[^<]*</title>' "${ROOTFS_DIR}/opt/cupcake/vanilla/index.html" 2>/dev/null || echo "MISSING")
          echo "Webgui index.html title: ${WEBGUI_TITLE}"
          echo "Vanilla index.html title: ${VANILLA_TITLE}"

          if [ "${WEBGUI_TITLE}" != "<title>Cupcake</title>" ]; then
              echo "ERROR: webgui has wrong title '${WEBGUI_TITLE}', expected '<title>Cupcake</title>'"
              exit 1
          fi
          if [ "${VANILLA_TITLE}" != "<title>Cupcake Vanilla</title>" ]; then
              echo "ERROR: vanilla has wrong title '${VANILLA_TITLE}', expected '<title>Cupcake Vanilla</title>'"
              exit 1
          fi
          echo "=== CUPCAKE: frontend titles verified ==="

          WEBGUI_COMMIT=$(git -C /tmp/webgui rev-parse --short HEAD 2>/dev/null || echo "unknown")
          VANILLA_NG_COMMIT=$(git -C /tmp/vanilla-ng rev-parse --short HEAD 2>/dev/null || echo "unknown")
          printf '%s\n' \
              "WEBGUI_COMMIT=${WEBGUI_COMMIT}" \
              "VANILLA_NG_COMMIT=${VANILLA_NG_COMMIT}" \
              > "${ROOTFS_DIR}/opt/cupcake/.frontend-versions"

          cp "${GITHUB_WORKSPACE}/provision/scripts/cupcake-vanilla-mdns.py" "${ROOTFS_DIR}/usr/local/bin/cupcake-vanilla-mdns"
          chmod +x "${ROOTFS_DIR}/usr/local/bin/cupcake-vanilla-mdns"
          cp "${GITHUB_WORKSPACE}/provision/scripts/update.sh" "${ROOTFS_DIR}/opt/cupcake/update.sh"
          chmod +x "${ROOTFS_DIR}/opt/cupcake/update.sh"
          cp "${GITHUB_WORKSPACE}/provision/scripts/configure-tailscale.sh" "${ROOTFS_DIR}/opt/cupcake/configure-tailscale.sh"
          chmod +x "${ROOTFS_DIR}/opt/cupcake/configure-tailscale.sh"
          cp "${GITHUB_WORKSPACE}/provision/scripts/configure-cloudflared.sh" "${ROOTFS_DIR}/opt/cupcake/configure-cloudflared.sh"
          chmod +x "${ROOTFS_DIR}/opt/cupcake/configure-cloudflared.sh"
          cp "${GITHUB_WORKSPACE}/provision/scripts/configure-storage.sh" "${ROOTFS_DIR}/opt/cupcake/configure-storage.sh"
          chmod +x "${ROOTFS_DIR}/opt/cupcake/configure-storage.sh"

          mkdir -p "${ROOTFS_DIR}/opt/cupcake/examples"
          cp "${GITHUB_WORKSPACE}/provision/config-examples/"*.example "${ROOTFS_DIR}/opt/cupcake/examples/"
          chmod 644 "${ROOTFS_DIR}/opt/cupcake/examples/"*.example

          mkdir -p "${ROOTFS_DIR}/boot/firmware"
          cp "${GITHUB_WORKSPACE}/provision/config-examples/"*.example "${ROOTFS_DIR}/boot/firmware/"
          chmod 644 "${ROOTFS_DIR}/boot/firmware/"*.example

          git clone --depth 1 https://github.com/noatgnu/cupcake_vanilla.git "${ROOTFS_DIR}/opt/cupcake/backend"

          git clone --depth 1 https://github.com/ggerganov/whisper.cpp.git /tmp/whisper-build
          cd /tmp/whisper-build
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DGGML_NATIVE=OFF \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++
          cmake --build build --config Release -j"$(nproc)"
          mkdir -p "${ROOTFS_DIR}/opt/cupcake/whisper.cpp/build/bin"
          mkdir -p "${ROOTFS_DIR}/opt/cupcake/whisper.cpp/models"
          cp build/bin/whisper-cli "${ROOTFS_DIR}/opt/cupcake/whisper.cpp/build/bin/"
          cd /tmp/whisper-build/models
          bash download-ggml-model.sh base
          cp ggml-base.bin "${ROOTFS_DIR}/opt/cupcake/whisper.cpp/models/"
          echo "=== CUPCAKE: decompressing seed database ==="
          df -h "${ROOTFS_DIR}"
          gunzip -c "${GITHUB_WORKSPACE}/cupcake-seed.sql.gz" > "${ROOTFS_DIR}/opt/cupcake/cupcake-seed.sql"
          SEED_BYTES=$(wc -c < "${ROOTFS_DIR}/opt/cupcake/cupcake-seed.sql")
          echo "Seed decompressed: ${SEED_BYTES} bytes at ${ROOTFS_DIR}/opt/cupcake/cupcake-seed.sql"
          test "$SEED_BYTES" -gt 1000 || { echo "ERROR: seed file too small (${SEED_BYTES} bytes) — disk full?"; exit 1; }
          df -h "${ROOTFS_DIR}"
          echo "=== CUPCAKE: 00-run.sh complete ==="
          EOF

          cat > pi-gen/stage2a/00-install-cupcake/01-run-chroot.sh << 'EOF'
          #!/bin/bash -e

          echo "=== CUPCAKE: pre-flight checks ==="
          df -h /
          SEED=/opt/cupcake/cupcake-seed.sql
          if [ ! -f "$SEED" ]; then
              echo "FATAL: $SEED not found — 00-run.sh failed to decompress seed"
              exit 1
          fi
          SEED_BYTES=$(wc -c < "$SEED")
          if [ "$SEED_BYTES" -lt 1000 ]; then
              echo "FATAL: $SEED is only ${SEED_BYTES} bytes — decompression failed or disk was full"
              exit 1
          fi
          echo "seed OK: ${SEED_BYTES} bytes"
          if [ ! -d /opt/cupcake/backend ]; then
              echo "FATAL: /opt/cupcake/backend not found — git clone failed in 00-run.sh"
              exit 1
          fi
          if [ ! -f /opt/cupcake/whisper.cpp/build/bin/whisper-cli ]; then
              echo "FATAL: whisper-cli binary not found — cross-compilation failed in 00-run.sh"
              exit 1
          fi
          echo "=== CUPCAKE: pre-flight passed — starting install ==="

          echo "=== CUPCAKE: installing packages ==="
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y curl gpg
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | gpg --dearmor -o /usr/share/keyrings/postgresql-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql-keyring.gpg] https://apt.postgresql.org/pub/repos/apt trixie-pgdg main" > /etc/apt/sources.list.d/pgdg.list
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            postgresql-16 postgresql-client-16 redis-server nginx \
            python3 python3-venv python3-dev libpq-dev \
            avahi-daemon avahi-utils git ffmpeg jq \
            network-manager wireless-tools iw \
            nfs-common cifs-utils exfatprogs python3-zeroconf

          DEBIAN_FRONTEND=noninteractive apt-get install -y coturn || true

          echo "=== CUPCAKE: installing Tailscale ==="
          curl -fsSL https://pkgs.tailscale.com/stable/debian/trixie.noarmor.gpg \
              -o /usr/share/keyrings/tailscale-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/debian trixie main" \
              > /etc/apt/sources.list.d/tailscale.list
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y tailscale

          echo "=== CUPCAKE: installing cloudflared ==="
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-arm64.deb \
              -o /tmp/cloudflared.deb
          dpkg -i /tmp/cloudflared.deb
          rm /tmp/cloudflared.deb

          systemctl --root=/ enable postgresql redis-server nginx avahi-daemon NetworkManager tailscaled
          systemctl --root=/ enable systemd-resolved 2>/dev/null || true
          systemctl --root=/ enable coturn 2>/dev/null || true

          sed -i 's/^hosts:.*/hosts: files mdns4_minimal [NOTFOUND=return] dns myhostname/' /etc/nsswitch.conf

          echo "=== CUPCAKE: creating users ==="
          mkdir -p /opt/cupcake/{backend,static,media,backups,venv}
          mkdir -p /var/log/cupcake

          useradd -r -s /usr/sbin/nologin -M -d /opt/cupcake cupcake-svc || true
          usermod -aG www-data cupcake-svc

          useradd -m -s /bin/bash cupcake || true
          echo 'cupcake:cupcake' | chpasswd
          usermod -aG sudo cupcake
          usermod -aG cupcake-svc cupcake

          chown -R cupcake-svc:cupcake-svc /opt/cupcake /var/log/cupcake
          chmod 775 /var/log/cupcake

          echo "=== CUPCAKE: setting up PostgreSQL ==="
          service postgresql start || \
            pg_ctlcluster "$(pg_lsclusters -h | head -1 | awk '{print $1, $2}')" start
          su - postgres -c "psql -c \"CREATE USER cupcake_vanilla WITH PASSWORD 'cupcake_vanilla_pass';\"" || true
          su - postgres -c "psql -c \"CREATE DATABASE cupcake_vanilla_db OWNER cupcake_vanilla;\"" || true
          su - postgres -c "psql -c \"ALTER USER cupcake_vanilla CREATEDB;\"" || true
          PG_HBA=$(su - postgres -c "psql -t -c 'SHOW hba_file;'" | tr -d ' ')
          sed -i 's/local[[:space:]]\+all[[:space:]]\+all[[:space:]]\+peer/local   all             all                                     md5/' "$PG_HBA"
          sed -i 's/host[[:space:]]\+all[[:space:]]\+all[[:space:]]\+127\.0\.0\.1\/32[[:space:]]\+scram-sha-256/host    all             all             127.0.0.1\/32            md5/' "$PG_HBA"
          service postgresql restart || \
            pg_ctlcluster "$(pg_lsclusters -h | head -1 | awk '{print $1, $2}')" restart

          echo "=== CUPCAKE: Python venv ==="
          python3 -m venv /opt/cupcake/venv
          /opt/cupcake/venv/bin/pip install --upgrade pip

          echo "=== CUPCAKE: installing backend ==="
          /opt/cupcake/venv/bin/pip install -r /opt/cupcake/backend/requirements.txt
          /opt/cupcake/venv/bin/pip install gunicorn "uvicorn[standard]" psycopg2-binary

          cat > /opt/cupcake/.env << 'DOTENV'
          POSTGRES_DB=cupcake_vanilla_db
          POSTGRES_USER=cupcake_vanilla
          POSTGRES_PASSWORD=cupcake_vanilla_pass
          POSTGRES_HOST=localhost
          POSTGRES_PORT=5432
          REDIS_HOST=127.0.0.1
          REDIS_PORT=6379
          DJANGO_SETTINGS_MODULE=cupcake_vanilla.settings
          SECRET_KEY=CHANGE-ON-FIRST-BOOT
          DEBUG=False
          ENABLE_CUPCAKE_MACARON=True
          ENABLE_CUPCAKE_MINT_CHOCOLATE=True
          ENABLE_CUPCAKE_SALTED_CARAMEL=True
          ENABLE_CUPCAKE_RED_VELVET=True
          ALLOWED_HOSTS=*
          CORS_ALLOWED_ORIGINS=https://cupcake.local,https://vanilla.local,http://cupcake.local,http://vanilla.local,http://localhost
          WHISPERCPP_PATH=/opt/cupcake/whisper.cpp/build/bin/whisper-cli
          WHISPERCPP_DEFAULT_MODEL=/opt/cupcake/whisper.cpp/models/ggml-base.bin
          WHISPERCPP_THREAD_COUNT=4
          COTURN_HOST=cupcake.local
          COTURN_PORT=3478
          COTURN_TLS_PORT=5349
          COTURN_SECRET=CHANGE-ON-FIRST-BOOT
          COTURN_REALM=cupcake.local
          COTURN_TTL=86400
          DOTENV

          mkdir -p /var/log/coturn
          chown turnserver:turnserver /var/log/coturn 2>/dev/null || true
          cat > /etc/turnserver.conf << 'TURNEOF'
          listening-port=3478
          listening-ip=0.0.0.0
          relay-ip=0.0.0.0
          fingerprint
          realm=cupcake.local
          use-auth-secret
          static-auth-secret=CHANGE-ON-FIRST-BOOT
          no-tls
          no-dtls
          no-loopback-peers
          no-multicast-peers
          min-port=49152
          max-port=65535
          total-quota=100
          user-quota=50
          log-file=/var/log/coturn/turnserver.log
          TURNEOF
          chown turnserver:turnserver /etc/turnserver.conf 2>/dev/null || true
          chmod 640 /etc/turnserver.conf
          echo 'TURNSERVER_ENABLED=1' > /etc/default/coturn
          systemctl --root=/ enable coturn

          cat > /opt/cupcake/first-boot.sh << 'FBEOF'
          #!/bin/bash
          set -e
          LOG=/var/log/cupcake/first-boot.log
          mkdir -p /var/log/cupcake
          exec > >(tee -a "$LOG") 2>&1
          echo "=== first-boot.sh started $(date -u) ==="

          ENV_FILE=/opt/cupcake/.env

          if grep -q "^SECRET_KEY=CHANGE-ON-FIRST-BOOT" "$ENV_FILE"; then
              echo "Generating SECRET_KEY..."
              SECRET_KEY=$(openssl rand -base64 48 | tr -d '\n')
              sed -i "s|^SECRET_KEY=CHANGE-ON-FIRST-BOOT|SECRET_KEY=${SECRET_KEY}|" "$ENV_FILE"
              echo "SECRET_KEY set"
          fi

          if grep -q "^COTURN_SECRET=CHANGE-ON-FIRST-BOOT" "$ENV_FILE"; then
              echo "Generating COTURN_SECRET..."
              COTURN_SECRET=$(openssl rand -hex 20)
              sed -i "s|^COTURN_SECRET=CHANGE-ON-FIRST-BOOT|COTURN_SECRET=${COTURN_SECRET}|" "$ENV_FILE"
              sed -i "s|^static-auth-secret=CHANGE-ON-FIRST-BOOT|static-auth-secret=${COTURN_SECRET}|" /etc/turnserver.conf
              systemctl restart coturn 2>/dev/null || true
              echo "COTURN_SECRET set"
          fi

          WIFI_CONFIG=/boot/firmware/cupcake-wifi.txt
          if [ -f "$WIFI_CONFIG" ]; then
              SSID=$(grep "^SSID=" "$WIFI_CONFIG" | cut -d= -f2-)
              PASSWORD=$(grep "^PASSWORD=" "$WIFI_CONFIG" | cut -d= -f2-)
              COUNTRY=$(grep "^COUNTRY=" "$WIFI_CONFIG" | cut -d= -f2-)
              COUNTRY=${COUNTRY:-GB}

              if [ -n "$SSID" ] && [ -n "$PASSWORD" ]; then
                  printf 'REGDOMAIN=%s\n' "$COUNTRY" > /etc/default/crda
                  iw reg set "$COUNTRY" 2>/dev/null || true
                  nmcli connection add \
                      type wifi \
                      con-name "cupcake-wifi" \
                      ifname "*" \
                      ssid "$SSID" \
                      wifi-sec.key-mgmt wpa-psk \
                      wifi-sec.psk "$PASSWORD" \
                      connection.autoconnect yes \
                      ipv4.method auto \
                      ipv6.method auto
                  nmcli connection up "cupcake-wifi" 2>/dev/null || true
              fi
              rm -f "$WIFI_CONFIG"
          fi

          TAILSCALE_CONFIG=/boot/firmware/cupcake-tailscale.txt
          if [ -f "$TAILSCALE_CONFIG" ]; then
              AUTHKEY=$(grep "^AUTHKEY=" "$TAILSCALE_CONFIG" | cut -d= -f2-)
              if [ -n "$AUTHKEY" ]; then
                  tailscale up --authkey "$AUTHKEY" --ssh 2>/dev/null || true
              fi
              rm -f "$TAILSCALE_CONFIG"
          fi

          CLOUDFLARED_CONFIG=/boot/firmware/cupcake-cloudflared.txt
          if [ -f "$CLOUDFLARED_CONFIG" ]; then
              TOKEN=$(grep "^TUNNEL_TOKEN=" "$CLOUDFLARED_CONFIG" | cut -d= -f2-)
              if [ -n "$TOKEN" ]; then
                  cloudflared service install "$TOKEN" 2>/dev/null || true
                  systemctl enable --now cloudflared 2>/dev/null || true
              fi
              rm -f "$CLOUDFLARED_CONFIG"
          fi

          STORAGE_CONFIG=/boot/firmware/cupcake-storage.txt
          if [ -f "$STORAGE_CONFIG" ]; then
              TYPE=$(grep "^TYPE=" "$STORAGE_CONFIG" | cut -d= -f2-)
              case "$TYPE" in
                  usb)
                      LABEL=$(grep "^LABEL=" "$STORAGE_CONFIG" | cut -d= -f2-)
                      FSTYPE=$(grep "^FSTYPE=" "$STORAGE_CONFIG" | cut -d= -f2- || echo "auto")
                      /opt/cupcake/configure-storage.sh usb "$LABEL" "$FSTYPE" || true
                      ;;
                  nfs)
                      SERVER=$(grep "^NFS_SERVER=" "$STORAGE_CONFIG" | cut -d= -f2-)
                      SHARE=$(grep "^NFS_SHARE=" "$STORAGE_CONFIG" | cut -d= -f2-)
                      /opt/cupcake/configure-storage.sh nfs "$SERVER" "$SHARE" || true
                      ;;
                  smb)
                      SERVER=$(grep "^SMB_SERVER=" "$STORAGE_CONFIG" | cut -d= -f2-)
                      USERNAME=$(grep "^SMB_USERNAME=" "$STORAGE_CONFIG" | cut -d= -f2-)
                      PASSWORD=$(grep "^SMB_PASSWORD=" "$STORAGE_CONFIG" | cut -d= -f2-)
                      /opt/cupcake/configure-storage.sh smb "$SERVER" "$USERNAME" "$PASSWORD" || true
                      ;;
              esac
              rm -f "$STORAGE_CONFIG"
          fi
          echo "=== first-boot.sh completed $(date -u) ==="
          FBEOF
          chmod +x /opt/cupcake/first-boot.sh
          chown root:root /opt/cupcake/first-boot.sh

          cd /opt/cupcake/backend
          set -a
          source /opt/cupcake/.env
          set +a
          /opt/cupcake/venv/bin/python manage.py migrate
          /opt/cupcake/venv/bin/python manage.py collectstatic --noinput

          DJANGO_SUPERUSER_USERNAME=admin \
          DJANGO_SUPERUSER_EMAIL=admin@cupcake.local \
          DJANGO_SUPERUSER_PASSWORD=cupcake \
          /opt/cupcake/venv/bin/python manage.py createsuperuser --noinput

          echo "=== CUPCAKE: restoring seed database ==="
          su - postgres -c "psql -c \"SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname='cupcake_vanilla_db';\""
          su - postgres -c "psql -c \"DROP DATABASE IF EXISTS cupcake_vanilla_db;\""
          su - postgres -c "psql -c \"CREATE DATABASE cupcake_vanilla_db OWNER cupcake_vanilla;\""
          su - postgres -c "psql cupcake_vanilla_db < /opt/cupcake/cupcake-seed.sql"
          rm -f /opt/cupcake/cupcake-seed.sql

          echo "=== CUPCAKE: verifying admin user ==="
          ADMIN_COUNT=$(su - postgres -c "psql -t -c \"SELECT COUNT(*) FROM auth_user WHERE username='admin' AND is_superuser=true;\" cupcake_vanilla_db" 2>/dev/null | tr -d ' \n' || echo "")
          if [ "${ADMIN_COUNT}" != "1" ]; then
              echo "WARNING: admin superuser missing (count='${ADMIN_COUNT}') — running migrate + createsuperuser"
              cd /opt/cupcake/backend
              set -a; source /opt/cupcake/.env; set +a
              /opt/cupcake/venv/bin/python manage.py migrate
              DJANGO_SUPERUSER_USERNAME=admin \
              DJANGO_SUPERUSER_EMAIL=admin@cupcake.local \
              DJANGO_SUPERUSER_PASSWORD=cupcake \
              /opt/cupcake/venv/bin/python manage.py createsuperuser --noinput
          else
              echo "Admin user verified OK"
          fi

          BACKEND_COMMIT=$(git -C /opt/cupcake/backend rev-parse --short HEAD 2>/dev/null || echo "unknown")
          WEBGUI_COMMIT=$(grep "^WEBGUI_COMMIT=" /opt/cupcake/.frontend-versions 2>/dev/null | cut -d= -f2-)
          VANILLA_NG_COMMIT=$(grep "^VANILLA_NG_COMMIT=" /opt/cupcake/.frontend-versions 2>/dev/null | cut -d= -f2-)
          cat > /opt/cupcake/versions.txt << VEREOF
          BACKEND_REF=master
          BACKEND_COMMIT=${BACKEND_COMMIT}
          WEBGUI_REF=master
          WEBGUI_COMMIT=${WEBGUI_COMMIT:-unknown}
          VANILLA_NG_REF=master
          VANILLA_NG_COMMIT=${VANILLA_NG_COMMIT:-unknown}
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LAST_UPDATE=
          VEREOF
          rm -f /opt/cupcake/.frontend-versions
          chown cupcake-svc:cupcake-svc /opt/cupcake/versions.txt

          echo "=== CUPCAKE: deploying nginx ==="
          mkdir -p /etc/ssl/cupcake
          openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
              -keyout /etc/ssl/cupcake/cupcake.key \
              -out /etc/ssl/cupcake/cupcake.crt \
              -subj "/CN=cupcake.local/O=Cupcake Appliance" \
              -addext "subjectAltName=DNS:cupcake.local,DNS:cupcake,DNS:vanilla.local,DNS:vanilla,DNS:localhost,IP:127.0.0.1"
          chmod 640 /etc/ssl/cupcake/cupcake.key

          cat > /etc/nginx/snippets/cupcake-ssl.conf << SSLEOF
          ssl_certificate     /etc/ssl/cupcake/cupcake.crt;
          ssl_certificate_key /etc/ssl/cupcake/cupcake.key;
          ssl_protocols       TLSv1.2 TLSv1.3;
          ssl_ciphers         HIGH:!aNULL:!MD5;
          ssl_session_cache   shared:SSL:10m;
          ssl_session_timeout 10m;
          SSLEOF

          cat > /etc/nginx/conf.d/cupcake-upstream.conf << NGXEOF
          upstream django_backend {
              server 127.0.0.1:8000;
          }
          NGXEOF

          cat > /etc/nginx/sites-available/vanilla.conf << NGXEOF
          server {
              listen 80 default_server;
              listen 443 ssl default_server;
              server_name vanilla.local vanilla localhost _;
              include /etc/nginx/snippets/cupcake-ssl.conf;
              client_max_body_size 2G;
              root /opt/cupcake/vanilla;
              index index.html;

              gzip on;
              gzip_types text/css application/javascript application/json image/svg+xml;
              gzip_vary on;

              location / {
                  try_files \$uri \$uri/ /index.html;
              }

              location /api/ {
                  proxy_pass http://django_backend;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
                  proxy_read_timeout 300s;
              }

              location /admin/static/ {
                  alias /opt/cupcake/backend/staticfiles/;
                  expires 7d;
              }

              location /admin/ {
                  proxy_pass http://django_backend;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
              }

              location /ws/ {
                  proxy_pass http://django_backend;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade \$http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_read_timeout 86400s;
              }

              location /static/ {
                  alias /opt/cupcake/backend/staticfiles/;
                  expires 7d;
              }

              location /internal/media/ {
                  internal;
                  alias /opt/cupcake/backend/media/;
              }
          }
          NGXEOF

          cat > /etc/nginx/sites-available/cupcake.conf << NGXEOF
          server {
              listen 80;
              listen 443 ssl;
              listen 8080 default_server;
              listen 8443 ssl default_server;
              server_name cupcake.local cupcake;
              include /etc/nginx/snippets/cupcake-ssl.conf;
              client_max_body_size 2G;
              root /opt/cupcake/webgui;
              index index.html;

              gzip on;
              gzip_types text/css application/javascript application/json image/svg+xml;
              gzip_vary on;

              location / {
                  try_files \$uri \$uri/ /index.html;
              }

              location /api/ {
                  proxy_pass http://django_backend;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
                  proxy_read_timeout 300s;
              }

              location /admin/static/ {
                  alias /opt/cupcake/backend/staticfiles/;
                  expires 7d;
              }

              location /admin/ {
                  proxy_pass http://django_backend;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
              }

              location /ws/ {
                  proxy_pass http://django_backend;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade \$http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_read_timeout 86400s;
              }

              location /static/ {
                  alias /opt/cupcake/backend/staticfiles/;
                  expires 7d;
              }

              location /internal/media/ {
                  internal;
                  alias /opt/cupcake/backend/media/;
              }
          }
          NGXEOF

          ln -sf /etc/nginx/sites-available/cupcake.conf /etc/nginx/sites-enabled/
          ln -sf /etc/nginx/sites-available/vanilla.conf /etc/nginx/sites-enabled/
          rm -f /etc/nginx/sites-enabled/default

          echo "=== CUPCAKE: verifying nginx config ==="
          nginx -t

          echo "=== CUPCAKE: deploying systemd ==="
          cat > /etc/systemd/system/cupcake-firstboot.service << 'UNITEOF'
          [Unit]
          Description=Cupcake First Boot Setup
          After=network-online.target local-fs.target
          Wants=network-online.target
          Before=cupcake-backend.service

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          User=root
          ExecStart=/opt/cupcake/first-boot.sh

          [Install]
          WantedBy=multi-user.target
          UNITEOF

          systemctl --root=/ enable cupcake-firstboot.service

          cat > /etc/systemd/system/cupcake-backend.service << 'UNITEOF'
          [Unit]
          Description=Cupcake Django Backend
          After=network.target postgresql.service redis-server.service cupcake-firstboot.service
          Requires=postgresql.service redis-server.service
          Wants=cupcake-firstboot.service

          [Service]
          Type=simple
          User=cupcake-svc
          Group=cupcake-svc
          WorkingDirectory=/opt/cupcake/backend
          EnvironmentFile=/opt/cupcake/.env
          ExecStart=/opt/cupcake/venv/bin/gunicorn cupcake_vanilla.asgi:application \
              --bind 127.0.0.1:8000 --workers 4 --timeout 300 \
              -k uvicorn.workers.UvicornWorker --log-level info
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          UNITEOF

          systemctl --root=/ enable cupcake-backend.service

          cat > /etc/systemd/system/cupcake-rqworker.service << 'UNITEOF'
          [Unit]
          Description=Cupcake RQ Worker (default high low)
          After=cupcake-backend.service
          Requires=cupcake-backend.service

          [Service]
          Type=simple
          User=cupcake-svc
          Group=cupcake-svc
          WorkingDirectory=/opt/cupcake/backend
          EnvironmentFile=/opt/cupcake/.env
          ExecStartPre=/opt/cupcake/venv/bin/python manage.py cleanup_dead_workers
          ExecStart=/opt/cupcake/venv/bin/python manage.py rqworker default high low
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          UNITEOF

          systemctl --root=/ enable cupcake-rqworker.service

          cat > /etc/systemd/system/cupcake-transcribe-worker.service << 'UNITEOF'
          [Unit]
          Description=Cupcake Transcribe Worker
          After=cupcake-backend.service
          Requires=cupcake-backend.service

          [Service]
          Type=simple
          User=cupcake-svc
          Group=cupcake-svc
          WorkingDirectory=/opt/cupcake/backend
          EnvironmentFile=/opt/cupcake/.env
          ExecStartPre=/opt/cupcake/venv/bin/python manage.py cleanup_dead_workers
          ExecStart=/opt/cupcake/venv/bin/python manage.py rqworker transcribe
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          UNITEOF

          systemctl --root=/ enable cupcake-transcribe-worker.service

          echo "=== CUPCAKE: deploying mDNS ==="
          cat > /etc/avahi/services/cupcake.service << 'AVHEOF'
          <?xml version="1.0" standalone='no'?>
          <!DOCTYPE service-group SYSTEM "avahi-service.dtd">
          <service-group>
            <name>Cupcake Appliance</name>
            <service>
              <type>_http._tcp</type>
              <port>80</port>
              <txt-record>path=/</txt-record>
            </service>
          </service-group>
          AVHEOF

          mkdir -p /etc/systemd/resolved.conf.d
          cat > /etc/systemd/resolved.conf.d/mdns.conf << 'RESOLVEDEOF'
          [Resolve]
          MulticastDNS=yes
          RESOLVEDEOF

          chmod +x /usr/local/bin/cupcake-vanilla-mdns

          cat > /etc/systemd/system/cupcake-vanilla-mdns.service << 'UNITEOF'
          [Unit]
          Description=Publish vanilla.local mDNS A record
          After=network-online.target avahi-daemon.service
          Wants=network-online.target

          [Service]
          Type=simple
          ExecStart=/usr/local/bin/cupcake-vanilla-mdns
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          UNITEOF
          systemctl --root=/ enable cupcake-vanilla-mdns.service

          chown -R cupcake-svc:cupcake-svc /opt/cupcake /var/log/cupcake
          chown root:cupcake-svc /opt/cupcake/.env
          chmod 640 /opt/cupcake/.env

          echo "=== CUPCAKE: SD card write optimizations ==="

          # noatime: skip access-time update on every file read
          sed -i '/ext4/s/defaults/defaults,noatime/' /etc/fstab

          # /tmp on tmpfs — scratch writes go to RAM
          printf 'tmpfs\t/tmp\ttmpfs\tdefaults,noatime,nosuid,size=128m\t0 0\n' >> /etc/fstab

          # journald: store in RAM only (biggest continuous writer on an appliance)
          mkdir -p /etc/systemd/journald.conf.d
          cat > /etc/systemd/journald.conf.d/cupcake.conf << 'JEOF'
          [Journal]
          Storage=volatile
          RuntimeMaxUse=64M
          JEOF

          # Redis: disable on-disk persistence — it is a job queue, not a database;
          # in-flight jobs lost on crash are re-queued by the backend on restart
          cat >> /etc/redis/redis.conf << 'REOF'

          save ""
          appendonly no
          REOF

          # PostgreSQL: reduce write amplification
          # synchronous_commit=off — commits acknowledged before fsync (last few
          # transactions may be lost on crash, schema integrity is preserved)
          PG_CONF=$(find /etc/postgresql -name "postgresql.conf" 2>/dev/null | head -1)
          if [ -n "$PG_CONF" ]; then
              cat >> "$PG_CONF" << 'PGEOF'

          synchronous_commit = off
          checkpoint_completion_target = 0.9
          max_wal_size = 256MB
          wal_buffers = 16MB
          PGEOF
          fi

          # nginx: disable access logging — error log is kept for debugging
          sed -i 's|access_log /var/log/nginx/access.log;|access_log off;|' /etc/nginx/nginx.conf

          echo "=== CUPCAKE: stopping services ==="
          service postgresql stop || \
            pg_ctlcluster "$(pg_lsclusters -h | head -1 | awk '{print $1, $2}')" stop || true

          echo "=== CUPCAKE: done ==="
          EOF

          echo "IMG_SUFFIX=-cupcake" > pi-gen/stage2a/EXPORT_IMAGE
          rm -f pi-gen/stage2/EXPORT_IMAGE
          chmod +x pi-gen/stage2a/prerun.sh \
            pi-gen/stage2a/00-install-cupcake/00-run.sh \
            pi-gen/stage2a/00-install-cupcake/01-run-chroot.sh

          touch pi-gen/stage3/SKIP pi-gen/stage4/SKIP pi-gen/stage5/SKIP

          cat > pi-gen/config << 'CFGEOF'
          IMG_NAME=cupcake-pi
          RELEASE=trixie
          DEPLOY_COMPRESSION=xz
          COMPRESSION_LEVEL=9
          LOCALE_DEFAULT=en_US.UTF-8
          TARGET_HOSTNAME=cupcake
          KEYBOARD_KEYMAP=gb
          KEYBOARD_LAYOUT="English (UK)"
          TIMEZONE_DEFAULT=UTC
          FIRST_USER_NAME=cupcake
          FIRST_USER_PASS=cupcake123
          ENABLE_SSH=1
          STAGE_LIST="stage0 stage1 stage2 stage2a"
          BOOTSTRAP_KEYRING=debian-archive-keyring
          CFGEOF

      - name: Build
        timeout-minutes: 180
        run: |
          cd pi-gen
          export DEBOOTSTRAP_QEMU_USER_STATIC=/usr/bin/qemu-aarch64-static
          sudo -E USE_DOCKER=0 ./build.sh

      - name: Post-build RPi image test
        timeout-minutes: 45
        run: |
          ROOTFS=$(find pi-gen/work -name "rootfs" -path "*/stage2a/rootfs" | head -1)
          echo "Testing with ROOTFS at: ${ROOTFS}"

          fail() { echo "FAIL: $*"; exit 1; }

          # Bind system filesystems so ARM64 daemons (via QEMU) can use /proc /sys
          sudo mount --bind /proc  "${ROOTFS}/proc"
          sudo mount --bind /sys   "${ROOTFS}/sys"
          sudo mount --bind /dev   "${ROOTFS}/dev"
          sudo mount --bind /dev/pts "${ROOTFS}/dev/pts"
          sudo mount -t tmpfs tmpfs "${ROOTFS}/run"

          cleanup() {
            sudo chroot "${ROOTFS}" nginx -s stop 2>/dev/null || true
            sudo chroot "${ROOTFS}" bash -c '
              kill $(cat /tmp/gunicorn.pid 2>/dev/null) 2>/dev/null || true
              service redis-server stop 2>/dev/null || true
              service postgresql stop  2>/dev/null || true
            ' 2>/dev/null || true
            sudo umount "${ROOTFS}/run" \
              "${ROOTFS}/dev/pts" "${ROOTFS}/dev" \
              "${ROOTFS}/sys"     "${ROOTFS}/proc" 2>/dev/null || true
          }
          trap cleanup EXIT

          # ── Services start (ARM64 binaries run via qemu-aarch64-static) ──
          echo "=== Starting PostgreSQL ==="
          sudo chroot "${ROOTFS}" service postgresql start \
            || fail "PostgreSQL failed to start"

          echo "=== Starting Redis ==="
          sudo chroot "${ROOTFS}" service redis-server start \
            || fail "Redis failed to start"

          echo "=== Starting Django backend (gunicorn, 1 worker) ==="
          sudo chroot "${ROOTFS}" bash -c '
            cd /opt/cupcake/backend
            set -a; source /opt/cupcake/.env; set +a
            /opt/cupcake/venv/bin/gunicorn cupcake_vanilla.asgi:application \
              --bind 127.0.0.1:8000 \
              --workers 1 \
              --timeout 300 \
              -k uvicorn.workers.UvicornWorker \
              --daemon \
              --pid /tmp/gunicorn.pid
          '

          echo "=== Starting nginx ==="
          sudo chroot "${ROOTFS}" nginx -t \
            || fail "nginx -t failed inside ROOTFS — config error"
          sudo chroot "${ROOTFS}" nginx \
            || fail "nginx failed to start"

          # ── Wait for Django (ARM64/QEMU: allow up to 10 min) ──
          echo "=== Waiting for Django backend (QEMU ARM64, up to 10 min) ==="
          for i in $(seq 1 120); do
            code=$(curl -s -o /dev/null -w "%{http_code}" \
              http://127.0.0.1:8000/api/v1/ 2>/dev/null) || true
            if echo "$code" | grep -qE "^[234]"; then
              echo "Backend ready after $((i * 5))s"
              break
            fi
            [ "$i" -eq 120 ] && fail "Backend never became ready in 10 min"
            sleep 5
          done

          CUPCAKE=$(curl -sfk --resolve "cupcake.local:443:127.0.0.1" https://cupcake.local/) \
            || fail "cupcake.local vhost did not return 200"
          VANILLA=$(curl -sfk --resolve "vanilla.local:443:127.0.0.1" https://vanilla.local/) \
            || fail "vanilla.local vhost did not return 200"
          echo "$CUPCAKE" | grep -q "<title>Cupcake</title>" \
            || fail "cupcake.local wrong title"
          echo "$VANILLA" | grep -q "<title>Cupcake Vanilla</title>" \
            || fail "vanilla.local wrong title"
          echo "PASS: nginx vhost routing correct for both frontends"

          mkdir -p /tmp/rpi-ui-test && cd /tmp/rpi-ui-test
          npm init -y --quiet
          npm install --quiet playwright
          npx playwright install chromium --with-deps
          cp "$GITHUB_WORKSPACE/.github/scripts/ui-test.js" .

          UI_TIMEOUT=90000 LOGIN_TIMEOUT=300000 \
            HOST_RESOLVER_RULES="MAP cupcake.local 127.0.0.1, MAP vanilla.local 127.0.0.1" \
            node ui-test.js

      - name: Upload RPi UI test screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rpi-ui-test-screenshots
          path: /tmp/rpi-ui-test/screenshot-*.png
          retention-days: 3

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: cupcake-pi-arm64
          path: pi-gen/deploy/*.img.xz
          retention-days: 30
          compression-level: 0

  publish-release:
    name: Publish RPi image to release
    needs: [build-rpi]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Download RPi image
        uses: actions/download-artifact@v4
        with:
          name: cupcake-pi-arm64
          path: release-assets/

      - name: Upload to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" release-assets/*.img.xz \
            --repo "${{ github.repository }}" \
            --clobber

  summary:
    name: Summary
    needs: [build-db, build-frontend, build-vm, build-rpi]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## Cupcake Appliance Images" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Seed DB | ${{ needs.build-db.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| VM ubuntu (amd64) | ${{ needs.build-vm.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| VM debian (amd64) | ${{ needs.build-vm.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| RPi (arm64) | ${{ needs.build-rpi.result }} |" >> $GITHUB_STEP_SUMMARY
