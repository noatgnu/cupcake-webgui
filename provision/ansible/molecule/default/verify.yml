---
- name: Verify
  hosts: all
  become: true
  tasks:

    - name: Check .env file exists and has correct permissions
      ansible.builtin.stat:
        path: /opt/cupcake/.env
      register: env_stat
      failed_when: not env_stat.stat.exists or env_stat.stat.mode != '0640'

    - name: Check SECRET_KEY is set in .env
      ansible.builtin.shell:
        cmd: grep -c '^SECRET_KEY=.\{10,\}' /opt/cupcake/.env
      changed_when: false
      register: secret_key_check
      failed_when: secret_key_check.rc != 0

    - name: Check Python venv exists
      ansible.builtin.stat:
        path: /opt/cupcake/venv/bin/activate
      register: venv_stat
      failed_when: not venv_stat.stat.exists

    - name: Check backend was cloned
      ansible.builtin.stat:
        path: /opt/cupcake/backend/manage.py
      register: manage_py_stat
      failed_when: not manage_py_stat.stat.exists

    - name: Check staticfiles were collected
      ansible.builtin.stat:
        path: /opt/cupcake/backend/staticfiles
      register: static_stat
      failed_when: not static_stat.stat.exists

    - name: Check SSL certificate exists
      ansible.builtin.stat:
        path: /etc/ssl/cupcake/cupcake.crt
      register: ssl_stat
      failed_when: not ssl_stat.stat.exists

    - name: Check SSL key has restricted permissions
      ansible.builtin.stat:
        path: /etc/ssl/cupcake/cupcake.key
      register: ssl_key_stat
      failed_when: not ssl_key_stat.stat.exists or ssl_key_stat.stat.mode != '0640'

    - name: Check nginx sites are enabled
      ansible.builtin.stat:
        path: "/etc/nginx/sites-enabled/{{ item }}"
      register: nginx_site_stat
      failed_when: not nginx_site_stat.stat.exists
      loop:
        - vanilla.conf
        - cupcake.conf

    - name: Check cupcake-backend systemd unit exists
      ansible.builtin.stat:
        path: /etc/systemd/system/cupcake-backend.service
      register: backend_unit_stat
      failed_when: not backend_unit_stat.stat.exists

    - name: Check PostgreSQL is active
      ansible.builtin.shell:
        cmd: systemctl is-active postgresql
      changed_when: false
      register: pg_active
      failed_when: pg_active.stdout != 'active'

    - name: Check Redis is active
      ansible.builtin.shell:
        cmd: systemctl is-active redis-server
      changed_when: false
      register: redis_active
      failed_when: redis_active.stdout != 'active'

    - name: Check nginx is active
      ansible.builtin.shell:
        cmd: systemctl is-active nginx
      changed_when: false
      register: nginx_active
      failed_when: nginx_active.stdout != 'active'

    - name: Check cupcake-backend is active
      ansible.builtin.shell:
        cmd: systemctl is-active cupcake-backend
      changed_when: false
      register: cupcake_active
      failed_when: cupcake_active.stdout != 'active'

    - name: Check cupcake-rqworker is active
      ansible.builtin.shell:
        cmd: systemctl is-active cupcake-rqworker
      changed_when: false
      register: rq_active
      failed_when: rq_active.stdout != 'active'

    - name: Wait for Django API to respond
      ansible.builtin.uri:
        url: http://127.0.0.1:8000/api/v1/
        status_code: [200, 301, 302, 404]
      register: api_check
      retries: 24
      delay: 5
      until: api_check.status in [200, 301, 302, 404]

    - name: Check nginx serves vanilla frontend on port 80
      ansible.builtin.uri:
        url: http://localhost/
        status_code: 200
      register: vanilla_check
      failed_when: vanilla_check.status != 200

    - name: Check nginx serves cupcake frontend on port 8080
      ansible.builtin.uri:
        url: http://localhost:8080/
        status_code: 200
      register: cupcake_check
      failed_when: cupcake_check.status != 200

    - name: Check Django admin is reachable via nginx
      ansible.builtin.uri:
        url: http://localhost/admin/
        status_code: [200, 301, 302]
      register: admin_check
      failed_when: admin_check.status not in [200, 301, 302]

    - name: Check PostgreSQL database exists
      ansible.builtin.shell:
        cmd: su - postgres -c "psql -tAc \"SELECT 1 FROM pg_database WHERE datname='cupcake_vanilla_db'\""
      changed_when: false
      register: db_check
      failed_when: db_check.stdout.strip() != '1'

    - name: Check Redis is bound to localhost only
      ansible.builtin.shell:
        cmd: grep '^bind ' /etc/redis/redis.conf
      changed_when: false
      register: redis_bind
      failed_when: "'127.0.0.1' not in redis_bind.stdout"

    - name: Check avahi-daemon is active
      ansible.builtin.shell:
        cmd: systemctl is-active avahi-daemon
      changed_when: false
      register: avahi_active
      failed_when: avahi_active.stdout != 'active'

    - name: Check update.sh is installed
      ansible.builtin.stat:
        path: /opt/cupcake/update.sh
      register: update_sh_stat
      failed_when: not update_sh_stat.stat.exists or not update_sh_stat.stat.executable
