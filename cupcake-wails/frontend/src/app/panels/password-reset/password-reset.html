<div class="reset-layout">
  <header class="panel-header">
    <i class="bi bi-key-fill header-icon"></i>
    <h1 class="title">Reset Password</h1>
  </header>

  <main class="panel-main">
    @if (loading()) {
      <div class="loading-state">
        <span class="spinner"></span>
        <span>Loading users...</span>
      </div>
    } @else {
      <div class="form-row">
        <label class="lbl" for="user">User</label>
        <div class="input-wrap">
          <i class="bi bi-person"></i>
          <select id="user" [(ngModel)]="selectedUser" [disabled]="resetting()">
            @for (user of users(); track user) {
              <option [value]="user">{{ user }}</option>
            }
          </select>
        </div>
      </div>

      <div class="form-row">
        <label class="lbl" for="newPassword">New Password</label>
        <div class="input-wrap">
          <i class="bi bi-key"></i>
          <input id="newPassword" type="password" [(ngModel)]="newPassword" placeholder="Min 8 characters" [disabled]="resetting()" />
        </div>
      </div>

      <div class="form-row">
        <label class="lbl" for="confirmPassword">Confirm</label>
        <div class="input-wrap">
          <i class="bi bi-shield-check"></i>
          <input id="confirmPassword" type="password" [(ngModel)]="confirmPassword" placeholder="Repeat password" [disabled]="resetting()" />
        </div>
      </div>

      @if (users().length === 0) {
        <div class="msg-bar warning">
          <i class="bi bi-exclamation-triangle"></i>
          No users found.
        </div>
      }
    }

    @if (error()) {
      <div class="msg-bar error">
        <i class="bi bi-exclamation-circle"></i>
        {{ error() }}
      </div>
    }

    @if (success()) {
      <div class="msg-bar success">
        <i class="bi bi-check-circle-fill"></i>
        Password reset successfully.
      </div>
    }
  </main>

  <footer class="panel-footer">
    <button class="btn-outline" (click)="close()" [disabled]="resetting()">Close</button>
    <div class="spacer"></div>
    <button class="btn-primary" (click)="resetPassword()" [disabled]="!isValid() || resetting() || users().length === 0">
      @if (resetting()) {
        <span class="spinner"></span>
      }
      Reset
    </button>
  </footer>
</div>
